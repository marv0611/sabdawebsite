name: Blog Daily Release

# Releases one queued blog article per weekday at 09:00 CET (07:00 UTC summer / 08:00 UTC winter)
# Reads blog-release-queue.json, finds article with today's release_date, flips it from noindex
# to index, adds it back to sitemap, commits + pushes.

on:
  schedule:
    # 07:00 UTC = 09:00 CEST (summer DST). For winter, GitHub Actions cron is UTC-only,
    # so winter releases will fire at 08:00 CET. Acceptable drift.
    # SECOND CRON at :15 past the hour is a backup: GitHub Actions deprioritizes
    # workflows scheduled at HH:00 due to cron-fan-out load (thundering herd).
    # If the :00 run gets silently dropped, the :15 catches it. The release
    # script is idempotent — it only flips articles dated today and skips
    # already-released ones, so a successful :00 run makes :15 a no-op.
    - cron: '0 7 * * 1-5'
    - cron: '15 7 * * 1-5'
  workflow_dispatch:
    inputs:
      force_slug:
        description: 'Force-release a specific slug (e.g. /blog/yoga-barcelona-guia/), bypassing date check'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run release script
        env:
          FORCE_SLUG: ${{ github.event.inputs.force_slug }}
        run: python3 scripts/blog-release.py

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes — nothing to release today"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          # Read the slug from a marker file written by the script
          if [ -f /tmp/released_slug.txt ]; then
            SLUG=$(cat /tmp/released_slug.txt)
            git commit -m "Release blog article: $SLUG" -m "Automated daily release. Flipped noindex→index, added to sitemap."
          else
            git commit -m "Daily blog release"
          fi
          git push
