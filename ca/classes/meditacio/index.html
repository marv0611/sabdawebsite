<script>
(function initGlobalParticles(){
  const canvas=document.getElementById('globalParticles');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  let W,H;
  let mouseX=-9999,mouseY=-9999;

  function resize(){
    W=window.innerWidth;H=window.innerHeight;
    canvas.width=W*devicePixelRatio;
    canvas.height=H*devicePixelRatio;
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  }
  resize();
  window.addEventListener('resize',resize);

  document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY});

  /* Particle field — spread across the entire viewport */
  const COUNT=672;
  const particles=Array.from({length:COUNT},()=>({
    x:Math.random()*3000,
    y:Math.random(),
    vx:0.008+Math.random()*0.06,
    vy:(Math.random()-0.5)*0.003,
    fx:0,fy:0,
    size:0.3+Math.random()*1.5,
    glow:4+Math.random()*16,
    color:(()=>{const c=Math.random();return c<0.38?[2,243,197]:c<0.72?[248,166,163]:[32,57,153]})(),
    opacity:0.025+Math.random()*0.12,
    phase:Math.random()*Math.PI*2,
    waveAmp:0.01+Math.random()*0.04,
    waveFreq:0.0001+Math.random()*0.0005,
  }));

  let t=0;
  function draw(){
    t++;
    ctx.clearRect(0,0,W,H);

    particles.forEach(p=>{
      p.x+=p.vx;
      p.y+=p.vy;
      const waveY=p.waveAmp*Math.sin(p.phase+t*p.waveFreq);
      let drawX=p.x+p.fx;
      let drawY=(p.y+waveY)*H+p.fy;

      /* mouse repulsion */
      const dx=drawX-mouseX;
      const dy=drawY-mouseY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120&&dist>0){
        const force=(1-dist/120)*2.5;
        p.fx+=(dx/dist)*force;
        p.fy+=(dy/dist)*force;
      }
      p.fx*=0.94;
      p.fy*=0.94;

      drawX=p.x+p.fx;
      drawY=(p.y+waveY)*H+p.fy;

      /* wrap */
      if(p.x>W+60){p.x=-50;p.y=Math.random();p.fx=0;p.fy=0}
      if(p.y<-0.05)p.y=1.05;
      if(p.y>1.05)p.y=-0.05;

      /* pulsing */
      const pulse=0.4+0.6*Math.sin(p.phase+t*0.001);
      const op=p.opacity*pulse;
      if(op<0.002)return;

      /* soft glow */
      const g=ctx.createRadialGradient(drawX,drawY,0,drawX,drawY,p.glow);
      g.addColorStop(0,`rgba(${p.color[0]},${p.color[1]},${p.color[2]},${op*0.7})`);
      g.addColorStop(0.3,`rgba(${p.color[0]},${p.color[1]},${p.color[2]},${op*0.28})`);
      g.addColorStop(0.7,`rgba(${p.color[0]},${p.color[1]},${p.color[2]},${op*0.04})`);
      g.addColorStop(1,`rgba(${p.color[0]},${p.color[1]},${p.color[2]},0)`);
      ctx.fillStyle=g;
      ctx.beginPath();
      ctx.arc(drawX,drawY,p.glow,0,Math.PI*2);
      ctx.fill();

      /* core */
      ctx.beginPath();
      ctx.arc(drawX,drawY,p.size*0.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.color[0]},${p.color[1]},${p.color[2]},${Math.min(0.6,op*2)})`;
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
