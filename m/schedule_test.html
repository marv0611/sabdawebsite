tizando una participaci\u00f3n segura y efectiva para todos. Este enfoque ayuda a construir una base s\u00f3lida, promoviendo el bienestar f\u00edsico, mental y espiritual. Esta clase se imparte en ingl\u00e9s. No se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/131834794", "dateTime": "2026-04-05T15:45:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/0f4c41cf-aa2c-4912-a2c4-ffe5c3721187.jpeg", "image2": null, "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": "", "streamPassword": "", "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 19, "ticketsSold": 11, "tags": [], "hostId": 54278, "published": true, "teacherId": 158940, "originalTeacherId": 158940, "originalTeacher": "Saurabh Sathyashankar", "teacher": "Saurabh Sathyashankar", "additionalTeachers": []}, {"id": 131834905, "title": "Serenity and Sound [EN]", "description": "(EN):\nSerenity and Sound is a calming practice that blends gentle yoga stretches, mindful breathing, and the restorative power of sound healing.\n\nThe class begins with soft movements to ease tension and closes with an extended savasana as soothing sounds guide you into deep rest.\n\nOpen to all levels: relax, reset, and restore your balance.\n\nNo previous experience necessary.\n\n(ES):\nSerenidad y Sonido es una pr\u00e1ctica calmante que combina suaves estiramientos de yoga, respiraci\u00f3n consciente y el poder restaurador de la terapia de sonido.\n\nLa clase comienza con movimientos suaves para liberar tensiones y finaliza con una savasana extendida mientras los sonidos sanadores te gu\u00edan hacia un descanso profundo.\n\nAbierto a todos los niveles: rel\u00e1jate, restablece tu energ\u00eda y recupera tu equilibrio.\n\nNo se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/131834905", "dateTime": "2026-04-05T17:00:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/be568755-2a22-4fc3-99a1-3eb929d7cd5d.jpg", "image2": null, "duration": 75, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 21, "ticketsSold": 9, "tags": [], "hostId": 54278, "published": true, "teacherId": 325565, "originalTeacherId": 187477, "originalTeacher": "Joelle Monfiletto", "teacher": "Claudia Exp\u00f3sito Pedrero", "additionalTeachers": []}, {"id": 131835244, "title": "Reset & Calm Breathwork [EN]", "description": "[EN] Using a conscious and connected breathing technique, we access an altered state of consciousness that allows us to regulate the nervous system, step out of autopilot mode, and live a more conscious and aligned life.\n\nWhen our nervous system is dysregulated, all alerts are activated, and the mind believes it is in danger. This leads us to be dominated by a constant state of anxiety and stress. If you live with anxiety, if you struggle to be aware of your breathing, if you know you need to pause but don't know how\u2014this is exactly what you need.\n\nIn this session, we are going to regulate your nervous system so you can live a more aligned life.\n\nThis class includes guided breathwork that may be physically and emotionally activating. It is not recommended for those who are pregnant, have cardiovascular conditions (including high blood pressure), epilepsy or seizure disorders, severe respiratory illness, a history of psychosis, bipolar disorder, or recent major surgery. If you have asthma, anxiety, or any medical condition, please consult your healthcare provider before attending and inform your facilitator. You are always in control and may return to normal breathing at any time.\n\n[ESP] Utilizando una t\u00e9cnica de respiraci\u00f3n consciente y conectada, accedemos a un estado alterado de consciencia que nos va a permitir regular el sistema nervioso para salir del piloto autom\u00e1tico y vivir una vida m\u00e1s consciente y alineada.\n\nCuando nuestro sistema nervioso esta desregulado todas las alertas se activan y la mente cree que esta en peligro, esto nos lleva a estar dominados por un estado constante de ansiedad y estr\u00e9s. Si vives con ansiedad, si te cuesta ser consciente de tu respiraci\u00f3n, si sabes que necesitas parar pero no sabes como, esto es lo que necesitas.\n\nEn esta sesi\u00f3n vamos a regular tu sistema nervioso para que puedas vivir una vida m\u00e1s alineada\n\nEsta clase incluye ejercicios de respiraci\u00f3n guiada que pueden resultar f\u00edsica y emocionalmente activadores. No se recomienda para personas que est\u00e9n embarazadas, tengan afecciones cardiovasculares (incluida hipertensi\u00f3n arterial), epilepsia o trastornos convulsivos, enfermedades respiratorias graves, antecedentes de psicosis, trastorno bipolar o hayan tenido una cirug\u00eda mayor reciente. Si tienes asma, ansiedad o cualquier otra condici\u00f3n m\u00e9dica, consulta a tu proveedor de atenci\u00f3n m\u00e9dica antes de asistir e informa a tu facilitador/a. T\u00fa siempre tienes el control y puedes volver a la respiraci\u00f3n normal en cualquier momento.", "type": "Regular", "link": "https://momence.com/s/131835244", "dateTime": "2026-04-05T18:30:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/097914c0-805e-42dc-bdfd-dabfa2ead826.jpeg", "image2": null, "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 25, "ticketsSold": 5, "tags": [], "hostId": 54278, "published": true, "teacherId": 267667, "originalTeacherId": 326265, "originalTeacher": "Paloma Martinez", "teacher": "Ellie Truffa", "additionalTeachers": []}, {"id": 127724487, "title": "Hatha Vinyasa [EN]", "description": "(EN): This class emphasizes precise body alignment and correct pose positioning to enhance stability and prevent injuries. Through slow, deliberate movements and holds, practitioners refine their technique and deepen their awareness in each posture. Props and modifications are encouraged to accommodate various levels of flexibility and strength, ensuring safe and effective participation for everyone. This approach helps build a solid foundation, promoting physical, mental, and spiritual well-being. This class is taught in English. No previous experience necessary.\n\n(ES): Esta clase enfatiza la alineaci\u00f3n precisa del cuerpo y la correcta colocaci\u00f3n de las posturas para mejorar la estabilidad y prevenir lesiones. A trav\u00e9s de movimientos lentos y deliberados, los practicantes refinan su t\u00e9cnica y profundizan su conciencia en cada postura. Se fomenta el uso de accesorios y modificaciones para adaptarse a diversos niveles de flexibilidad y fuerza, garantizando una participaci\u00f3n segura y efectiva para todos. Este enfoque ayuda a construir una base s\u00f3lida, promoviendo el bienestar f\u00edsico, mental y espiritual. Esta clase se imparte en ingl\u00e9s. No se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/127724487", "dateTime": "2026-04-06T07:00:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/0f4c41cf-aa2c-4912-a2c4-ffe5c3721187.jpeg", "image2": "https://images.momence.com/h/54278/session-host-photo/b6e7ec86-19f1-4013-95f7-feffdbbe1bd6.jpg", "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": "", "streamPassword": "", "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 19, "ticketsSold": 11, "tags": [], "hostId": 54278, "published": true, "teacherId": 158940, "originalTeacherId": 158940, "originalTeacher": "Saurabh Sathyashankar", "teacher": "Saurabh Sathyashankar", "additionalTeachers": []}, {"id": 125786099, "title": "Core Pilates [EN]", "description": "(EN): This mat-based Core Pilates workout focuses on core strength, flexibility, balance, and overall body awareness. The class will tone and challenge your core stability, helping you develop a strong and resilient abdomen. Discover the power of your core as you work on your strength, flexibility, and body alignment, while enjoying a full-body workout. This class is taught in English. No previous experience necessary.\n\n(ES): Esta sesi\u00f3n de Pilates centrada en el n\u00facleo se enfoca en la fuerza abdominal, la flexibilidad, el equilibrio y la conciencia corporal general. La clase tonificar\u00e1 y desafiar\u00e1 tu estabilidad central, ayud\u00e1ndote a desarrollar un abdomen fuerte y resistente. Descubre el poder de tu core mientras trabajas en tu fuerza, flexibilidad y alineaci\u00f3n corporal, disfrutando de un entrenamiento completo. Esta clase se imparte en ingl\u00e9s\n(EN): This mat-based Core Pilates workout focuses on core strength, flexibility, balance, and overall body awareness. The class will tone and challenge your core stability, helping you develop a strong and resilient abdomen. Discover the power of your core as you work on your strength, flexibility, and body alignment, while enjoying a full-body workout. This class is taught in English. No previous experience necessary.\n\n(ES): Esta sesi\u00f3n de Pilates centrada en el n\u00facleo se enfoca en la fuerza abdominal, la flexibilidad, el equilibrio y la conciencia corporal general. La clase tonificar\u00e1 y desafiar\u00e1 tu estabilidad central, ayud\u00e1ndote a desarrollar un abdomen fuerte y resistente. Descubre el poder de tu core mientras trabajas en tu fuerza, flexibilidad y alineaci\u00f3n corporal, disfrutando de un entrenamiento completo. Esta clase se imparte en ingl\u00e9s. No se requiere experiencia previa.. No se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/125786099", "dateTime": "2026-04-06T08:15:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/08069d64-9beb-4123-aa9f-5e6b421c10c8.jpeg", "image2": null, "duration": 50, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 13, "ticketsSold": 17, "tags": [], "hostId": 54278, "published": true, "teacherId": 298902, "originalTeacherId": 171153, "originalTeacher": "Lali Dochiia", "teacher": "Natalia Dercz", "additionalTeachers": []}, {"id": 130006564, "title": "Full Body Pilates [EN]", "description": "(EN): A dynamic, well-rounded mat session rooted in the original Joseph Pilates method. This 55-minute class activates and strengthens deep stabilizing muscles while improving posture, mobility, and core control. Expect a seamless flow of classical mat exercises infused with sculpt-inspired elements for added tone and endurance. You\u2019ll leave feeling centered, strong, and lengthened from head to toe. This class is taught in English. No previous experience necessary.\n\n(ES): Una sesi\u00f3n din\u00e1mica y completa de pilates en colchoneta, basada en el m\u00e9todo original de Joseph Pilates. Esta clase de 55 minutos activa y fortalece los m\u00fasculos profundos estabilizadores, mejorando la postura, la movilidad y el control del core. Espera una secuencia fluida de ejercicios cl\u00e1sicos de pilates combinados con elementos inspirados en el entrenamiento de tonificaci\u00f3n para aumentar la resistencia y la fuerza. Saldr\u00e1s sinti\u00e9ndote centrado, fuerte y alargado de pies a cabeza. La clase se imparte en ingl\u00e9s. No se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/130006564", "dateTime": "2026-04-06T11:30:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/08069d64-9beb-4123-aa9f-5e6b421c10c8.jpeg", "image2": "https://images.momence.com/h/54278/session-host-photo/a1c6f9c1-8bbd-4d89-90ea-582cb230c35b.jpg", "duration": 50, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 24, "ticketsSold": 6, "tags": [], "hostId": 54278, "published": true, "teacherId": 298902, "originalTeacherId": 298902, "originalTeacher": "Natalia Dercz", "teacher": "Natalia Dercz", "additionalTeachers": []}, {"id": 129018484, "title": "Power Pilates [EN]", "description": "(EN): A dynamic and intense session that fuses fitness and Pilates to work your entire body. This class uses a combination of isolated and integrated movements to build control, core strength, balance, and muscular endurance. Perfect for those looking to challenge their limits and enhance their overall fitness and body awareness. This class is taught in English. No previous experience necessary.\n\n(ES): Una sesi\u00f3n din\u00e1mica e intensa que fusiona el fitness y el Pilates para trabajar todo el cuerpo. Esta clase utiliza una combinaci\u00f3n de movimientos aislados e integrados para desarrollar el control, la fuerza del core, el equilibrio y la resistencia muscular. Perfecta para quienes buscan desafiar sus l\u00edmites y mejorar su condici\u00f3n f\u00edsica y conciencia corporal en general. Esta clase se imparte en ingl\u00e9s. No se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/129018484", "dateTime": "2026-04-06T16:00:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/67c882cb-0500-4670-8ce3-326a7334d4ed.jpeg", "image2": null, "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 15, "ticketsSold": 15, "tags": [], "hostId": 54278, "published": true, "teacherId": 160406, "originalTeacherId": 160402, "originalTeacher": "Carolina Rodrigues", "teacher": "Cristina L McLauchlan", "additionalTeachers": []}, {"id": 126202561, "title": "Vinyasa [EN]", "description": "(EN):\nVinyasa yoga is characterized by a sequence of postures that flow smoothly from one to the next, synchronizing breath with the moment. This style emphasizes flexibility, strength, and endurance, as practitioners move through a dynamic flow. The continuous motion combined with deep, controlled breathing enhances both physical and mental stamina. This class is taught in English. No previous experience necessary.\n\n(ES):\nEl yoga Vinyasa se caracteriza por una secuencia de posturas que se conectan de una a la otra, sincronizando la respiraci\u00f3n con el movimiento. Este estilo enfatiza la flexibilidad, la fuerza y la resistencia, ya que los practicantes se mueven a trav\u00e9s de un flujo din\u00e1mico. El movimiento continuo combinado con una respiraci\u00f3n profunda y controlada mejora tanto la resistencia f\u00edsica como mental. Esta clase se imparte en ingl\u00e9s. No se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/126202561", "dateTime": "2026-04-06T17:15:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/01cbb92e-633f-416a-ac0d-a447c973e49d.jpeg", "image2": null, "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": false, "capacity": 30, "spotsRemaining": 26, "ticketsSold": 4, "tags": [], "hostId": 54278, "published": true, "teacherId": 160655, "originalTeacherId": 160655, "originalTeacher": "Shelley Chiprut", "teacher": "Shelley Chiprut", "additionalTeachers": []}, {"id": 127700333, "title": "Alchemy Breathwork [EN/ES]", "description": "[EN]\nAlchemy Breathwork is a guided journey, your breath becomes the portal a psychedelic journey where you access the medicine within.\n\nIn a 60 min session, through circular breathing, music and somatic release, we drop beneath the thinking mind and into altered states of clarity, vision and emotional alchemy- no substances, just the power of your own breath.\nExpect: visuals behind closed eyes, emotional release + nervous system reset, expanded awareness + deep embodiment. The feeling of coming home to your body\n\nNot suitable for people with cardiovascular or respiratory conditions, epilepsy, pregnancy, recent surgeries, or severe mental health issues. This class includes guided breathwork that may be physically and emotionally activating. It is not recommended for those who are pregnant, have cardiovascular conditions (including high blood pressure), epilepsy or seizure disorders, severe respiratory illness, a history of psychosis, bipolar disorder, or recent major surgery. If you have asthma, anxiety, or any medical condition, please consult your healthcare provider before attending and inform your facilitator. You are always in control and may return to normal breathing at any time.\n\n[ES]\nAlchemy Breathwork es un viaje guiado donde tu respiraci\u00f3n se convierte en el portal hacia una experiencia psicod\u00e9lica, permiti\u00e9ndote acceder a la medicina que llevas dentro.\n\nEn una sesi\u00f3n de 60 minutos, mediante respiraci\u00f3n circular, m\u00fasica y liberaci\u00f3n som\u00e1tica, descendemos por debajo de la mente pensante y entramos en estados alterados de claridad, visi\u00f3n y alquimia emocional\u2026 sin sustancias, solo con el poder de tu propia respiraci\u00f3n.\nPuedes esperar: visuales detr\u00e1s de los ojos cerrados, liberaci\u00f3n emocional + reseteo del sistema nervioso, conciencia expandida + encarnaci\u00f3n profunda. La sensaci\u00f3n de volver a casa en tu propio cuerpo.\n\nNo es adecuado para personas con problemas cardiovasculares o respiratorios, epilepsia, embarazo, cirug\u00edas recientes o problemas graves de salud mental. Esta clase incluye ejercicios de respiraci\u00f3n guiada que pueden resultar f\u00edsica y emocionalmente activadores. No se recomienda para personas que est\u00e9n embarazadas, tengan afecciones cardiovasculares (incluida hipertensi\u00f3n arterial), epilepsia o trastornos convulsivos, enfermedades respiratorias graves, antecedentes de psicosis, trastorno bipolar o hayan tenido una cirug\u00eda mayor reciente.\nSi tienes asma, ansiedad o cualquier otra condici\u00f3n m\u00e9dica, consulta a tu proveedor de atenci\u00f3n m\u00e9dica antes de asistir e informa a tu facilitador/a.\nT\u00fa siempre tienes el control y puedes volver a la respiraci\u00f3n normal en cualquier momento.", "type": "Regular", "link": "https://momence.com/s/127700333", "dateTime": "2026-04-06T18:30:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/88b3e338-0661-4383-829b-10e4082bb06e.jpeg", "image2": null, "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": false, "capacity": 30, "spotsRemaining": 23, "ticketsSold": 7, "tags": [], "hostId": 54278, "published": true, "teacherId": 160655, "originalTeacherId": 160655, "originalTeacher": "Shelley Chiprut", "teacher": "Shelley Chiprut", "additionalTeachers": []}, {"id": 127724764, "title": "Power Vinyasa [EN]", "description": "(EN):\nPower Vinyasa yoga is characterized by a fast-paced sequence of postures that flow smoothly from one to the next, synchronizing breath with the moment. This style emphasizes flexibility, strength, and endurance, as practitioners move through a dynamic flow. The continuous motion combined with deep, controlled breathing enhances both physical and mental stamina. This class is taught in English. Prior yoga experience recommended.\n\n(ES):\nEl yoga Power Vinyasa se caracteriza por una secuencia r\u00e1pida de posturas que se conectan de una a la otra, sincronizando la respiraci\u00f3n con el movimiento. Este estilo enfatiza la flexibilidad, la fuerza y la resistencia, ya que los practicantes se mueven a trav\u00e9s de un flujo din\u00e1mico. El movimiento continuo combinado con una respiraci\u00f3n profunda y controlada mejora tanto la resistencia f\u00edsica como mental. Esta clase se imparte en ingl\u00e9s. Se recomienda experiencia previa en yoga.", "type": "Regular", "link": "https://momence.com/s/127724764", "dateTime": "2026-04-07T06:00:00.000Z", "image1": null, "image2": "https://images.momence.com/h/54278/session-host-photo/63464ea2-de86-4711-a3fc-63233a269405.jpg", "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": "", "streamPassword": "", "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 28, "ticketsSold": 2, "tags": [], "hostId": 54278, "published": true, "teacherId": 160406, "originalTeacherId": 160406, "originalTeacher": "Cristina L McLauchlan", "teacher": "Cristina L McLauchlan", "additionalTeachers": []}, {"id": 127725296, "title": "Glutes and Core Lab  [EN]", "description": "EN\nGlutes & Core Lab is an energizing and fun lower-body focused workout designed to build strength, power, and definition. Through controlled movements, functional sequences, and the use of props such as bands and light weights, you\u2019ll activate glutes, legs, and deep core muscles. Expect dynamic strength work balanced with focused stretching. This class emphasizes connection to your breath and body, improving stability, endurance, and posture. Open to all levels. No previous experience necessary.\n\nESP\n\nGlutes & Core Lab es una clase llena de energ\u00eda y diversi\u00f3n enfocada en fuerza, potencia y definici\u00f3n de gl\u00fateos, piernas y core profundo. A trav\u00e9s de secuencias controladas y el uso de props como bandas y pesas ligeras, trabajar\u00e1s estabilidad y resistencia. Incluye momentos de estiramiento y focus en la conexi\u00f3n con tu respiraci\u00f3n y tu cuerpo. Apta para todos los niveles. No se requiere experiencia previ g", "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": "", "streamPassword": "", "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 23, "ticketsSold": 7, "tags": [], "hostId": 54278, "published": true, "teacherId": 160655, "originalTeacherId": 160655, "originalTeacher": "Shelley Chiprut", "teacher": "Shelley Chiprut", "additionalTeachers": []}, {"id": 128323487, "title": "Yoga Sculpt [EN/ES]", "description": "(EN): Yoga Sculpt classes offer a dynamic, full-body workout that combines traditional yoga poses with strength training exercises to build endurance, flexibility, and muscle tone. Using light weights, resistance bands, blocks, and bodyweight movements, the class intensifies the yoga asana practice for a more powerful, cardio-boosting experience. Yoga Sculpt enhances both physical and mental resilience, providing a balanced challenge for body and mind. This class is taught in English. No previous experience required.\n\n(ES): Las clases de Yoga Sculpt ofrecen un entrenamiento din\u00e1mico y de cuerpo completo que combina posturas tradicionales de yoga con ejercicios de entrenamiento de fuerza para desarrollar resistencia, flexibilidad y tono muscular. Utilizando pesas ligeras, bandas de resistencia, bloques y movimientos con el propio peso corporal, la clase intensifica la pr\u00e1ctica de asanas de yoga para una experiencia m\u00e1s potente y con impulso cardiovascular. Yoga Sculpt mejora tanto la resiliencia f\u00edsica como mental, proporcionando un desaf\u00edo equilibrado para el cuerpo y la mente. Esta clase se imparte en ingl\u00e9s. No se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/128323487", "dateTime": "2026-04-07T11:30:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/5191a3dc-b1bd-451f-a510-fdf25618af67.jpeg", "image2": null, "duration": 45, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": "", "streamPassword": "", "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 27, "ticketsSold": 3, "tags": [], "hostId": 54278, "published": true, "teacherId": 160656, "originalTeacherId": 160656, "originalTeacher": "Silvanna Castell\u00f3n", "teacher": "Silvanna Castell\u00f3n", "additionalTeachers": []}, {"id": 127724587, "title": "Hatha Yoga [EN]", "description": "(EN): This class emphasizes precise body alignment and correct pose positioning to enhance stability and prevent injuries. Through slow, deliberate movements and holds, practitioners refine their technique and deepen their awareness in each posture. Props and modifications are encouraged to accommodate various levels of flexibility and strength, ensuring safe and effective participation for everyone. This approach helps build a solid foundation, promoting physical, mental, and spiritual well-being. This class is taught in English. No previous experience necessary.\n\n(ES): Esta clase enfatiza la alineaci\u00f3n precisa del cuerpo y la correcta colocaci\u00f3n de las posturas para mejorar la estabilidad y prevenir lesiones. A trav\u00e9s de movimientos lentos y deliberados, los practicantes refinan su t\u00e9cnica y profundizan su conciencia en cada postura. Se fomenta el uso de accesorios y modificaciones para adaptarse a diversos niveles de flexibilidad y fuerza, garantizando una participaci\u00f3n segura y efectiva para todos. Este enfoque ayuda a construir una base s\u00f3lida, promoviendo el bienestar f\u00edsico, mental y espiritual. Esta clase se imparte en ingl\u00e9s. No se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/127724587", "dateTime": "2026-04-07T16:00:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/15ff0ac2-329c-4471-9640-fe204a7cb127.jpeg", "image2": "https://images.momence.com/h/54278/session-host-photo/d55007ba-986d-4276-9553-06bf2f8b2b61.jpg", "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": "", "streamPassword": "", "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 26, "ticketsSold": 4, "tags": [], "hostId": 54278, "published": true, "teacherId": 158940, "originalTeacherId": 158940, "originalTeacher": "Saurabh Sathyashankar", "teacher": "Saurabh Sathyashankar", "additionalTeachers": []}, {"id": 126286947, "title": "Yin & Sound Healing [EN]", "description": "(EN):\nFind a deep sense of grounding as you hold yin poses for several minutes, enhancing flexibility and mindfulness. These accessible poses gently stretch and stimulate the connective tissues, fostering physical and emotional release. Complementing the practice, immerse yourself in the calming vibrations of sound healing instruments. The harmonious blend of gentle movement and sound therapy will leave you feeling refreshed, balanced, and deeply connected to your inner self. This class is taught in English. No previous experience necessary.\n\n(ES):\nEncuentra un profundo sentido de conexi\u00f3n con la tierra mientras mantienes las posturas de Yin durante varios minutos, mejorando la flexibilidad y la atenci\u00f3n plena. Estas posturas accesibles estiran y estimulan suavemente los tejidos conectivos, fomentando la liberaci\u00f3n f\u00edsica y emocional. Complementando la pr\u00e1ctica, sum\u00e9rgete en las vibraciones calmantes de los instrumentos de sanaci\u00f3n con sonido. La armoniosa combinaci\u00f3n de movimiento suave y terapia de sonido te dejar\u00e1 sinti\u00e9ndote renovado, equilibrado y profundamente conectado con tu ser interior. Esta clase se imparte en ingl\u00e9s. No se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/126286947", "dateTime": "2026-04-07T17:15:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/b0165c47-e5e7-4774-8e3e-88072d34dbc4.jpg", "image2": "https://images.momence.com/h/54278/session-host-photo/e6ae2f01-4c54-4f80-b0d9-3869c9da33fb.jpg", "duration": 70, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": "", "streamPassword": "", "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 22, "ticketsSold": 8, "tags": [], "hostId": 54278, "published": true, "teacherId": 160650, "originalTeacherId": 160650, "originalTeacher": "Juliet Levine", "teacher": "Juliet Levine", "additionalTeachers": []}, {"id": 131834050, "title": "Recharge Breathwork [EN/ES]", "description": "[EN]\nThis session is for you if you live at full speed \u2014 professional, entrepreneur, creative or parent \u2014 and feel the need to reset without stepping away from your life.\n\nYou\u2019re craving clarity, energy, and space to breathe.\n\nIn 60 minutes:\n\ud83c\udf00 Neurobics & movement to activate body and mind\n\ud83c\udfb5 Sound + breath to regulate your nervous system\n\ud83e\uddd8\u200d\u2642\ufe0f Breath hold + meditation to go deeper\n\ud83d\udcdd Integration to anchor the shift\n\n\u2728 You\u2019ll leave feeling calmer, clearer, and re-energized.\n\nWhy it works:\n\u2714\ufe0f Midweek reset\n\u2714\ufe0f No disruption to your routine\n\u2714\ufe0f Finish your week focused, not drained\n\n\ud83e\uddfa Bring: comfortable clothes, water\n\n\u26a0\ufe0f Not suitable if pregnant, with heart conditions or recent surgery (check before booking).\n\n\nImmersive Breathwork Soma Breath Instructor & Human Growth Facilitator\nYou don\u2019t need a retreat. Just one hour to come back to yourself.\n[ES]\nEsta sesi\u00f3n es para ti si vives a alta velocidad \u2014 profesional, emprendedor/a, creativo/a o padre/madre \u2014 y sientes que necesitas un reset sin parar tu vida.\n\nBuscas claridad, energ\u00eda y un espacio real para respirar.\n\n**En 60 minutos:**\n\ud83c\udf00 Neurobics y movimiento para activar cuerpo y mente\n\ud83c\udfb5 Sonido y respiraci\u00f3n para regular tu sistema nervioso\n\ud83e\uddd8\u200d\u2 nk": "https://momence.com/s/125296978", "dateTime": "2026-04-08T08:15:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/08069d64-9beb-4123-aa9f-5e6b421c10c8.jpeg", "image2": null, "duration": 55, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 24, "ticketsSold": 6, "tags": [], "hostId": 54278, "published": true, "teacherId": 267109, "originalTeacherId": 171153, "originalTeacher": "Lali Dochiia", "teacher": "Stacey Harwood", "additionalTeachers": []}, {"id": 126328444, "title": "Power Pilates [EN]", "description": "(EN): A dynamic and intense session that fuses fitness and Pilates to work your entire body. This class uses a combination of isolated and integrated movements to build control, core strength, balance, and muscular endurance. Perfect for those looking to challenge their limits and enhance their overall fitness and body awareness. This class is taught in English. No previous experience necessary.\n\n(ES): Una sesi\u00f3n din\u00e1mica e intensa que fusiona el fitness y el Pilates para trabajar todo el cuerpo. Esta clase utiliza una combinaci\u00f3n de movimientos aislados e integrados para desarrollar el control, la fuerza del core, el equilibrio y la resistencia muscular. Perfecta para quienes buscan desafiar sus l\u00edmites y mejorar su condici\u00f3n f\u00edsica y conciencia corporal en general. Esta clase se imparte en ingl\u00e9s. No se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/126328444", "dateTime": "2026-04-08T11:30:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/8ae0efb9-a655-497d-ac50-12cc9817403a.jpeg", "image2": null, "duration": 50, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 26, "ticketsSold": 4, "tags": [], "hostId": 54278, "published": true, "teacherId": 267109, "originalTeacherId": 267109, "originalTeacher": "Stacey Harwood", "teacher": "Stacey Harwood", "additionalTeachers": []}, {"id": 126337013, "title": "Sound Healing [EN]", "description": "(EN):\nExperience profound grounding through the calming vibrations of sound healing instruments. This class is an immersive journey into the world of sound therapy, where each note and rhythm fosters physical and emotional release. As you immerse yourself in these harmonious sounds, you'll find a unique way to enhance mindfulness and inner balance. This class is taught in English. No previous experience necessary.\n\n(ES):\nExperimenta una profunda sensaci\u00f3n de paz a trav\u00e9s de las vibraciones calmantes de los instrumentos de sanaci\u00f3n con sonido. Esta clase es un viaje inmersivo en el mundo de la terapia de sonido, donde cada nota y ritmo promueve la liberaci\u00f3n f\u00edsica y emocional. Al sumergirte en estos sonidos armoniosos, descubrir\u00e1s una forma \u00fanica de mejorar la atenci\u00f3n plena y el equilibrio interior. Esta clase se imparte en ingl\u00e9s. No se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/126337013", "dateTime": "2026-04-08T16:00:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/fe9e29bb-d6b5-4985-a658-1f9b02e3b6ca.jpg", "image2": "https://images.momence.com/h/54278/session-host-photo/072c96fe-b03f-4cf4-84ab-c282cc05cb3e.jpg", "duration": 50, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 27, "ticketsSold": 3, "tags": [], "hostId": 54278, "published": true, "teacherId": 160650, "originalTeacherId": 160650, "originalTeacher": "Juliet Levine", "teacher": "Juliet Levine", "additionalTeachers": []}, {"id": 128323149, "title": "Hatha Vinyasa [EN]", "description": "(EN): This class emphasizes precise body alignment and correct pose positioning to enhance stability and prevent injuries. Through slow, deliberate movements and holds, practitioners refine their technique and deepen their awareness in each posture. Props and modifications are encouraged to accommodate various levels of flexibility and strength, ensuring safe and effective participation for everyone. This approach helps build a solid foundation, promoting physical, mental, and spiritual well-being. This class is taught in English. No previous experience necessary.\n\n(ES): Esta clase enfatiza la alineaci\u00f3n precisa del cuerpo y la correcta colocaci\u00f3n de las posturas para mejorar la estabilidad y prevenir lesiones. A trav\u00e9s de movimientos lentos y deliberados, los practicantes refinan su t\u00e9cnica y profundizan su conciencia en cada postura. Se fomenta el uso de accesorios y modificaciones para adaptarse a diversos niveles de flexibilidad y fuerza, garantizando una participaci\u00f3n segura y efectiva para todos. Este enfoque ayuda a construir una base s\u00f3lida, promoviendo el bienestar f\u00edsico, mental y espiritual. Esta clase se imparte en ingl\u00e9s. No se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/128323149", "dateTime": "2026-04-08T17:05:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/0f4c41cf-aa2c-4912-a2c4-ffe5c3721187.jpeg", "image2": null, "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": "", "streamPassword": "", "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 25, "ticketsSold": 5, "tags": [], "hostId": 54278, "published": true, "teacherId": 158940, "originalTeacherId": 158940, "originalTeacher": "Saurabh Sathyashankar", "teacher": "Saurabh Sathyashankar", "additionalTeachers": []}, {"id": 128323029, "title": "Serenity and Sound [EN]", "description": "(EN):\nSerenity and Sound is a calming practice that blends gentle yoga stretches, mindful breathing, and the restorative power of sound healing.\n\nThe class begins with soft movements to ease tension and closes with an extended savasana as soothing sounds guide you into deep rest.\n\nOpen to all levels: relax, reset, and restore your balance.\n\nNo previous experience necessary.\n\n(ES):\nSerenidad y Sonido es una pr\u00e1ctica calmante que combina suaves estiramientos de yoga, respiraci\u00f3n consciente y el poder restaurador de la terapia de sonido.\n\nLa clase comienza con movimientos suaves para liberar tensiones y finaliza con una savasana extendida mientras los sonidos sanadores te gu\u00edan hacia un descanso profundo.\n\nAbierto a todos los niveles: rel\u00e1jate, restablece tu energ\u00eda y recupera tu equilibrio.\n\nNo se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/128323029", "dateTime": "2026-04-08T18:20:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/be568755-2a22-4fc3-99a1-3eb929d7cd5d.jpg", "image2": null, "duration": 75, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 27, "ticketsSold": 3, "tags": [], "hostId": 54278, "published": true, "teacherId": 325565, "originalTeacherId": 187477, "originalTeacher": "Joelle Monfiletto", "teacher": "Claudia Exp\u00f3sito Pedrero", "additionalTeachers": []}, {"id": 128320153, "title": "Power Vinyasa [EN]", "description": "(EN):\nPower Vinyasa yoga is characterized by a fast-paced sequence of postures that flow smoothly from one to the next, synchronizing breath with the moment. This style emphasizes flexibility, strength, and endurance, as practitioners move through a dynamic flow. The continuous motion combined with deep, controlled breathing enhances both physical and mental stamina. This class is taught in English. Prior yoga experience recommended.\n\n(ES):\nEl yoga Power Vinyasa se caracteriza por una secuencia r\u00e1pida de posturas que se conectan de una a la otra, sincronizando la respiraci\u00f3n con el movimiento. Este estilo enfatiza la flexibilidad, la fuerza y la resistencia, ya que los practicantes se mueven a trav\u00e9s de un flujo din\u00e1mico. El movimiento continuo combinado con una respiraci\u00f3n profunda y controlada mejora tanto la resistencia f\u00edsica como mental. Esta clase se imparte en ingl\u00e9s. Se recomienda experiencia previa en yoga.", "type": "Regular", "link": "https://momence.com/s/128320153", "dateTime": "2026-04-09T06:00:00.000Z", "image1": null, "image2": null, "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": "", "streamPassword": "", "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 29, "ticketsSold": 1, "tags": [], "hostId": 54278, "published": true, "teacherId": 160407, "originalTeacherId": 160407, "originalTeacher": "Elita Dionigi", "teacher": "Elita Dionigi", "additionalTeachers": []}, {"id": 128320558, "title": "Power Pilates [EN]", "description": "(EN): A dynamic and intense session that fuses fitness and Pilates to work your entire body. This class uses a combination of isolated and integrated movements to build control, core strength, balance, and muscular endurance. Perfect for those looking to challenge their limits and enhance their overall fitness and body awareness. This class is taught in English. No previous experience necessary.\n\n(ES): Una sesi\u00f3n din\u00e1mica e intensa que fusiona el fitness y el Pilates para trabajar todo el cuerpo. Esta clase utiliza una combinaci\u00f3n de movimientos aislados e integrados para desarrollar el control, la fuerza del core, el equilibrio y la resistencia muscular. Perfecta para quienes buscan desafiar sus l\u00edmites y mejorar su condici\u0 l, "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 27, "ticketsSold": 3, "tags": [], "hostId": 54278, "published": true, "teacherId": 160656, "originalTeacherId": 160656, "originalTeacher": "Silvanna Castell\u00f3n", "teacher": "Silvanna Castell\u00f3n", "additionalTeachers": []}, {"id": 128320756, "title": "Yoga Sculpt [EN]", "description": "(EN): Yoga Sculpt classes offer a dynamic, full-body workout that combines traditional yoga poses with strength training exercises to build endurance, flexibility, and muscle tone. Using light weights, resistance bands, blocks, and bodyweight movements, the class intensifies the yoga asana practice for a more powerful, cardio-boosting experience. Yoga Sculpt enhances both physical and mental resilience, providing a balanced challenge for body and mind. This class is taught in English. \nNo previous experience necessary.\n\n(ES): Las clases de Yoga Sculpt ofrecen un entrenamiento din\u00e1mico y de cuerpo completo que combina posturas tradicionales de yoga con ejercicios de entrenamiento de fuerza para desarrollar resistencia, flexibilidad y tono muscular. Utilizando pesas ligeras, bandas de resistencia, bloques y movimientos con el propio peso corporal, la clase intensifica la pr\u00e1ctica de asanas de yoga para una experiencia m\u00e1s potente y con impulso cardiovascular. Yoga Sculpt mejora tanto la resiliencia f\u00edsica como mental, proporcionando un desaf\u00edo equilibrado para el cuerpo y la mente. Esta clase se imparte en ingl\u00e9s. \nNo se requiere experiencia previa.\n", "type": "Regular", "link": "https://momence.com/s/128320756", "dateTime": "2026-04-09T11:30:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/5191a3dc-b1bd-451f-a510-fdf25618af67.jpeg", "image2": null, "duration": 50, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": "", "streamPassword": "", "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 28, "ticketsSold": 2, "tags": [], "hostId": 54278, "published": true, "teacherId": 160654, "originalTeacherId": 160654, "originalTeacher": "Sabrina Reboll", "teacher": "Sabrina Reboll", "additionalTeachers": []}, {"id": 128320689, "title": "Core Pilates [EN]", "description": "(EN): This mat-based Core Pilates workout focuses on core strength, flexibility, balance, and overall body awareness. The class will tone and challenge your core stability, helping you develop a strong and resilient abdomen. Discover the power of your core as you work on your strength, flexibility, and body alignment, while enjoying a full-body workout. This class is taught in English. No previous experience necessary.\n\n(ES): Esta sesi\u00f3n de Pilates centrada en el n\u00facleo se enfoca en la fuerza abdominal, la flexibilidad, el equilibrio y la conciencia corporal general. La clase tonificar\u00e1 y desafiar\u00e1 tu estabilidad central, ayud\u00e1ndote a desarrollar un abdomen fuerte y resistente. Descubre el poder de tu core mientras trabajas en tu fuerza, flexibilidad y alineaci\u00f3n corporal, disfrutando de un entrenamiento completo. Esta clase se imparte en ingl\u00e9s.\n\n", "type": "Regular", "link": "https://momence.com/s/128320689", "dateTime": "2026-04-09T16:00:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/08069d64-9beb-4123-aa9f-5e6b421c10c8.jpeg", "image2": null, "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 23, "ticketsSold": 7, "tags": [], "hostId": 54278, "published": true, "teacherId": 267109, "originalTeacherId": 267109, "originalTeacher": "Stacey Harwood", "teacher": "Stacey Harwood", "additionalTeachers": []}, {" c instruments and intentional frequencies. The session supports the release of accumulated tension, quiets mental noise, and gently brings the body back into coherence. Each week explores a different emotional theme. This class is taught in English and Spanish. No previous experience necessary.\n\n(ES): Un viaje sonoro inmersivo dise\u00f1ado para resetear tu sistema y restaurar el equilibrio interior. Cada sesi\u00f3n comienza con una breve pr\u00e1ctica guiada de regulaci\u00f3n del sistema nervioso antes de acompa\u00f1arte en una experiencia sonora cuidadosamente creada con instrumentos terap\u00e9uticos y frecuencias intencionadas. La sesi\u00f3n favorece la liberaci\u00f3n de tensi\u00f3n acumulada, calma el ruido mental y devuelve al cuerpo a un estado de coherencia. Cada semana se explora un tema emocional distinto. Esta clase se imparte en ingl\u00e9s y espa\u00f1ol. No se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/131924410", "dateTime": "2026-04-09T18:30:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/036decd3-11b3-4697-bbbb-c86dbcfc51d4.jpeg", "image2": null, "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 24, "ticketsSold": 6, "tags": [], "hostId": 54278, "published": true, "teacherId": 298897, "originalTeacherId": 298897, "originalTeacher": "Angela Rocs", "teacher": "Angela Rocs", "additionalTeachers": []}, {"id": 131509243, "title": "Glutes and Core Lab  [EN]", "description": "EN\nGlutes & Core Lab is an energizing and fun lower-body focused workout designed to build strength, power, and definition. Through controlled movements, functional sequences, and the use of props such as bands and light weights, you\u2019ll activate glutes, legs, and deep core muscles. Expect dynamic strength work balanced with focused stretchi var selDate=null,actF='All';

function getCat(t){
  var l=t.toLowerCase();
  if(l.indexOf('vinyasa')>=0||l.indexOf('hatha')>=0||l.indexOf('yin yoga')>=0||l.indexOf('yoga sculpt')>=0||l.indexOf('yoga &')>=0)return'Yoga';
  if(l.indexOf('pilates')>=0||l.indexOf('glutes')>=0)return'Pilates';
  if(l.indexOf('sound')>=0||l.indexOf('serenity')>=0||l.indexOf('guided sound')>=0)return'Sound';
  if(l.indexOf('breath')>=0||l.indexOf('recharge')>=0)return'Breathwork';
  return'Other';
}
function getLang(t){var m=t.match(/\[(.*?)\]/);return m?m[1]:'';}
function clean(t){return t.replace(/\s*\[.*?\]\s*/,'').trim();}
function fmtTime(iso){
  var d=new Date(iso);
  return d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Europe/Madrid'});
}
function get7d(){
  var days=[],now=new Date();
  for(var i=0;i<7;i++){var d=new Date(now);d.setDate(now.getDate()+i);days.push(d);}
  return days;
}
function getMadridDate(d){return d.toLocaleDateString('en-CA',{timeZone:'Europe/Madrid'});}

function renderDays(){
  var c=document.getElementById('days');
  var days=get7d();
  if(!selDate)selDate=getMadridDate(days[0]);
  c.innerHTML=days.map(function(d){
    var ds=getMadridDate(d);
    var isToday=ds===getMadridDate(new Date());
    var label=isToday?'Today':d.toLocaleDateString('en-US',{weekday:'short',timeZone:'Europe/Madrid'});
    var num=d.toLocaleDateString('en-US',{day:'numeric',timeZone:'Europe/Madrid'});
    return '<button class="day-btn'+(ds===selDate?' active':'')+'" onclick="selDate=\''+ds+'\';renderDays();renderSched()"><span class="day-lbl">'+label+'</span><span class="day-num">'+num+'</span></button>';
  }).join('');
}

function renderFilters(ev){
  var cats=new Set(['All']);ev.forEach(function(e){cats.add(getCat(e.title))});
  var c=document.getElementById('filters');
  c.innerHTML=Array.from(cats).map(function(cat){
    return '<button class="flt-btn'+(cat===actF?' active':'')+'" onclick="actF=\''+cat+'\';renderFilters(allE);renderSched()">'+cat+'</button>';
  }).join('');
}

function renderSched(){
  var f=allE.filter(function(e){
    var ed=new Date(e.dateTime).toLocaleDateString('en-CA',{timeZone:'Europe/Madrid'});
    return ed===selDate;
  });
  if(actF!=='All')f=f.filter(function(e){return getCat(e.title)===actF});
  f.sort(function(a,b){return new Date(a.dateTime)-new Date(b.dateTime)});
  var c=document.getElementById('sched');
  if(!f.length){c.innerHTML='<div style="text-align:center;padding:60px 20px;color:rgba(240,239,233,.38)">No classes this day</div>';return;}
  c.innerHTML=f.map(function(e,i){
    var time=fmtTime(e.dateTime);var hm=time.split(':');
    var title=clean(e.title);var lang=getLang(e.title);
    var sp=e.spotsRemaining;var full=sp===0;
    var fn=(e.teacher||'').split(' ')[0]||'';
    var sc=full?'fu':sp<=3?'lo':'av';
    var st=full?'Full':sp<=3?sp+' spots left':sp+' spots';
    return '<div class="cc" style="animation-delay:'+i*.05+'s"><div class="ct"><div class="ct-h">'+hm[0]+':'+hm[1]+'</div><div class="ct-d">'+e.duration+' min</div></div><div class="ci"><div class="ci-t">'+title+(lang?'<span class="ci-lg">'+lang+'</span>':'')+'</div><div class="ci-tc">'+fn+'</div><div class="ci-sp '+sc+'">'+st+'</div></div><div class="ca">'+(full?'<button class="bb fu">Full</button>':'<button class="bb">Book</button>')+'</div></div>';
  }).join('');
}

// Init
allE=allE.filter(function(e){return new Date(e.dateTime)>new Date(Date.now()-3600000)});
renderDays();
renderFilters(allE);
renderSched();
document.getElementById('sched').style.display='block';
</script>
