/* TAB BAR */

<script src="https://momence.com/plugin/host-schedule/host-schedule.js" host_id="54278" locale="en" i18n='{"TEACHER_SELECT_PLACEHOLDER":"Teachers","TEACHER":"Teacher","SUBSTITUTES_FOR_SHORT":"Sub for"}'></script>
<script>
(function(){
  var el=document.getElementById('momence-plugin-host-schedule');
  if(!el)return;
  var vars={'--momence-background':'#0e1235','--momence-white':'#131842','--momence-primary-color':'#f0efe9','--momence-secondary-color':'rgba(240,239,233,.6)','--momence-tertiary-color':'rgba(240,239,233,.38)','--momence-primary-500':'#02F3C5','--momence-primary-400':'rgba(2,243,197,.55)','--momence-primary-600':'#00d4ac','--momence-primary-050':'rgba(2,243,197,.04)','--momence-primary-100':'rgba(2,243,197,.08)','--momence-black-500':'#f0efe9','--momence-black-400':'rgba(240,239,233,.8)','--momence-black-300':'rgba(240,239,233,.65)','--momence-black-200':'rgba(240,239,233,.5)','--momence-black-100':'rgba(240,239,233,.35)','--momence-grey-200':'rgba(240,239,233,.08)','--momence-grey-100':'rgba(240,239,233,.05)','--momence-grey-050':'rgba(240,239,233,.03)','--momence-session-separator-color':'rgba(240,239,233,.06)'};
  function av(){var r=document.documentElement;for(var k in vars)r.style.setProperty(k,vars[k],'important')}
  av();
  new MutationObserver(av).observe(document.head,{childList:true,subtree:true});
  var vc=0,vi=setInterval(function(){av();if(++vc>25)clearInterval(vi)},200);
  var moved=false;
  function moveDaySelector(){
    if(moved)return;
    var fr=el.querySelector('.momence-host_schedule-first_row');
    var ds=el.querySelector('.momence-day_selection');
    if(!fr||!ds)return;
    var vt=fr.querySelector('.momence-view-toggle');
    if(vt&&vt.parentElement)fr.insertBefore(ds,vt.parentElement);
    else fr.appendChild(ds);
    fr.style.cssText='display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:12px';
    ds.style.cssText='flex:1;min-width:200px;order:1';
    var et=fr.querySelector('.momence-event_type_select');
    if(et)et.style.cssText='order:0;flex-shrink:0';
    if(vt&&vt.parentElement)vt.parentElement.style.cssText='order:2;flex-shrink:0;margin-left:auto';
    moved=true;
  }
  function patchText(){
    el.querySelectorAll('button,span').forEach(function(b){
      b.childNodes.forEach(function(n){
        if(n.nodeType===3){
          if(n.textContent.indexOf('Practitioners')>=0)n.textContent=n.textContent.replace(/Practitioners/g,'Teachers');
          if(n.textContent.indexOf('Practitioner')>=0)n.textContent=n.textContent.replace(/Practitioner/g,'Teacher');
        }
      });
    });
  }
  new MutationObserver(function(){moveDaySelector();patchText()}).observe(el,{childList:true,subtree:true,characterData:true});
  [500,1000,1500,2500,4000].forEach(function(ms){setTimeout(function(){moveDaySelector();patchText()},ms)});
})();
</script>

<script>
var fis=document.querySelectorAll('.fi');
var io=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('vis');io.unobserve(e.target)}})},{threshold:.15});
fis.forEach(function(el){io.observe(el)});
</script>
