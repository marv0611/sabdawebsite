<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e1235">
<title>Schedule | SABDA</title>



<style>
:root{--navy:#0e1235;--navy95:rgba(14,18,53,.95);--navy-light:#131842;--salmon:#F8A6A3;--cyan:#02F3C5;--white:#f0efe9;--white80:rgba(240,239,233,.8);--white60:rgba(240,239,233,.6);--white38:rgba(240,239,233,.38);--white20:rgba(240,239,233,.2);--white12:rgba(240,239,233,.12);--white06:rgba(240,239,233,.06);--white03:rgba(240,239,233,.03);--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);--ease:cubic-bezier(.16,1,.3,1)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{overflow-x:hidden;-webkit-text-size-adjust:100%}
body{background:var(--navy);color:var(--white);font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;padding-top:calc(52px + var(--safe-t));padding-bottom:calc(72px + var(--safe-b));overflow-x:hidden}
a{color:inherit;text-decoration:none}img{display:block;max-width:100%}button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
.touch{transition:transform .12s,opacity .12s}.touch:active{transform:scale(.98);opacity:.8}

/* HEADER */
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;height:calc(52px + var(--safe-t));padding-top:var(--safe-t);display:flex;align-items:center;justify-content:space-between;padding-left:20px;padding-right:16px;background:var(--navy95);backdrop-filter:saturate(1.4) blur(24px);-webkit-backdrop-filter:saturate(1.4) blur(24px);border-bottom:1px solid var(--white06)}
.hdr img{height:18px;width:auto;opacity:.9}
.hdr-pill{padding:7px 16px;background:var(--cyan);color:var(--navy);border-radius:100px;font-size:.68rem;font-weight:700;line-height:1;box-shadow:0 2px 12px rgba(2,243,197,.2)}
.hdr-back{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--white60);font-weight:500}
.hdr-back svg{width:16px;height:16px;stroke:var(--white60);fill:none;stroke-width:2}

/* DAYS — horizontal scroll */
.days{display:flex;gap:6px;padding:16px 20px 0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.days::-webkit-scrollbar{display:none}
.day-btn{background:none;border:1px solid var(--white12);color:var(--white60);padding:8px 14px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;cursor:pointer;transition:all .25s;min-width:64px;text-align:center;flex-shrink:0}
.day-btn:hover{border-color:rgba(2,243,197,.3)}
.day-btn.active{background:rgba(2,243,197,.08);border-color:var(--cyan);color:var(--cyan);font-weight:700}
.day-name{display:block;font-size:.48rem;letter-spacing:.08em;text-transform:uppercase;color:inherit;opacity:.7;margin-bottom:2px}
.day-num{font-size:1rem;font-weight:700;line-height:1}

/* FILTERS */
.filters{display:flex;gap:6px;padding:12px 20px 0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.fp{background:none;border:1px solid var(--white12);color:var(--white60);padding:6px 14px;border-radius:100px;font-size:.68rem;font-weight:500;cursor:pointer;transition:all .25s;white-space:nowrap;flex-shrink:0}
.fp:hover{border-color:rgba(2,243,197,.3)}
.fp.active{background:rgba(2,243,197,.08);border-color:var(--cyan);color:var(--cyan);font-weight:700}

/* SCHEDULE LIST */
.schedule{padding:8px 0 0}
.cc{display:grid;grid-template-columns:52px 1fr auto;gap:12px;align-items:center;padding:14px 20px;border-bottom:1px solid var(--white06);opacity:0;transform:translateY(8px);animation:ci .4s var(--ease) forwards}
@keyframes ci{to{opacity:1;transform:none}}
.ct{text-align:center}
.ct-h{font-family:'PT Serif',serif;font-size:.95rem;font-weight:700;line-height:1.1}
.ct-d{font-size:.55rem;color:var(--white38);margin-top:4px;letter-spacing:.04em}
.ci{min-width:0}
.ci-t{font-family:'PT Serif',serif;font-size:.88rem;font-weight:700;margin-bottom:2px}
.ci-tc{font-size:.72rem;color:var(--white60)}
.ci-lg{display:inline-block;font-size:.5rem;color:var(--white38);border:1px solid var(--white06);padding:1px 5px;border-radius:3px;margin-left:6px;letter-spacing:.04em;vertical-align:middle}
.ci-sp{font-size:.62rem;margin-top:4px}
.ci-sp.av{color:var(--cyan)}.ci-sp.lo{color:var(--salmon)}.ci-sp.fu{color:var(--white38)}
.ca{text-align:right}
.bb{background:var(--cyan);color:var(--navy);border:none;padding:10px 20px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.04em;cursor:pointer;white-space:nowrap}
.bb:active{transform:scale(.95)}
.bb.fu{background:none;border:1px solid var(--white12);color:var(--white38);cursor:default;padding:9px 16px}
.bb.wl{background:none;border:1px solid var(--salmon);color:var(--salmon)}
.no-classes{text-align:center;padding:60px 20px;color:var(--white38);font-size:.82rem}

/* SKELETON */
.sk{padding:16px 20px}
.sk-r{display:grid;grid-template-columns:52px 1fr auto;gap:12px;padding:14px 0;border-bottom:1px solid var(--white06);align-items:center}
.sk-b{background:linear-gradient(90deg,rgba(240,239,233,.03) 25%,rgba(240,239,233,.06) 50%,rgba(240,239,233,.03) 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:4px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* MODAL — full screen on mobile */
.mo{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;opacity:0;transition:opacity .3s}
.mo.open{display:flex;opacity:1}
.mo-box{width:100vw;height:100vh;max-height:none;background:var(--navy-light);overflow-y:auto;border-radius:0}
.mo.open .mo-box{transform:none}
.mo-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--white06);position:sticky;top:0;background:var(--navy-light);z-index:2}
.mo-t{font-family:'PT Serif',serif;font-size:1rem;font-weight:700}
.mo-c{font-size:.75rem;color:var(--white60);margin-top:2px}
.mo-x{background:none;border:1px solid var(--white12);color:var(--white60);width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mo-x svg{width:14px;height:14px}
.mo-bd{padding:20px}
.mo-ft{padding:12px 20px;border-top:1px solid var(--white06);text-align:center;position:sticky;bottom:0;background:var(--navy-light)}
.mo-sec{font-size:.62rem;color:var(--white38);display:flex;align-items:center;justify-content:center;gap:6px}
.mo-sec svg{width:12px;height:12px;opacity:.5}

/* BOOKING FLOW */
.bk-class{text-align:center;padding-bottom:16px;border-bottom:1px solid var(--white06);margin-bottom:16px}
.bk-class-name{font-family:'PT Serif',serif;font-size:1.2rem;font-weight:700;margin-bottom:4px}
.bk-class-meta{font-size:.78rem;color:var(--white60);display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.bk-class-meta span{display:flex;align-items:center;gap:4px}
.bk-class-meta svg{width:14px;height:14px;opacity:.5}
.bk-spots{display:inline-block;font-size:.65rem;font-weight:600;padding:3px 10px;border-radius:20px;margin-top:8px}
.bk-spots.av{color:var(--cyan);background:rgba(2,243,197,.08);border:1px solid rgba(2,243,197,.15)}
.bk-spots.lo{color:var(--salmon);background:rgba(248,166,163,.08);border:1px solid rgba(248,166,163,.15)}
.bk-login{animation:bkIn .3s var(--ease)}
@keyframes bkIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.bk-label{display:block;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--white38);font-weight:600;margin-bottom:6px}
.bk-input{width:100%;padding:14px;background:rgba(240,239,233,.04);border:1px solid var(--white12);border-radius:10px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;transition:border-color .25s;margin-bottom:14px;box-sizing:border-box;-webkit-appearance:none}
.bk-input:focus{border-color:rgba(2,243,197,.4)}
.bk-input::placeholder{color:var(--white38)}
.bk-input.bk-field-err{border-color:var(--salmon);background:rgba(248,166,163,.04)}
.bk-field-msg{display:none;font-size:.65rem;color:var(--salmon);margin:-10px 0 10px;padding:0 2px}
.bk-input.bk-field-err+.bk-field-msg{display:block}
.bk-err{color:var(--salmon);font-size:.72rem;min-height:20px;margin-bottom:8px;text-align:center}
.bk-primary{width:100%;padding:16px;background:var(--cyan);color:var(--navy);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:background .25s,transform .2s;-webkit-appearance:none}
.bk-primary:hover{background:#33f5d1}
.bk-primary:disabled{opacity:.5;cursor:default}
.bk-link{display:block;text-align:center;margin-top:14px;font-size:.78rem;color:var(--white60);cursor:pointer}
.bk-link:hover{color:var(--white)}
.bk-or{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--white38);font-size:.7rem;text-transform:uppercase;letter-spacing:.1em}
.bk-or::before,.bk-or::after{content:'';flex:1;height:1px;background:var(--white06)}
.bk-social{width:100%;padding:13px;border:1px solid var(--white12);border-radius:10px;font-size:.82rem;color:var(--white60);display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:border-color .25s;margin-bottom:8px;-webkit-appearance:none}
.bk-social:hover{border-color:var(--white38)}
.bk-social svg{width:18px;height:18px}
.bk-mfa-inputs{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.bk-mfa-digit{width:44px;height:52px;text-align:center;font-size:1.3rem;font-weight:700;background:rgba(240,239,233,.04);border:1px solid var(--white12);border-radius:10px;color:var(--white);font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}
.bk-mfa-digit:focus{border-color:rgba(2,243,197,.4)}

/* CONFIRM */
.bk-done{text-align:center;animation:bkIn .4s var(--ease)}
.bk-done-icon{width:56px;height:56px;border-radius:50%;background:rgba(2,243,197,.1);border:2px solid var(--cyan);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.bk-done-icon svg{width:24px;height:24px;stroke:var(--cyan);stroke-width:3;fill:none}
.bk-done h3{font-family:'PT Serif',serif;font-size:1.2rem;margin-bottom:6px}
.bk-done p{font-size:.82rem;color:var(--white60)}

/* STRIPE CARD */
.bk-pay-total{text-align:center;font-family:'PT Serif',serif;font-size:1.4rem;font-weight:700;margin-bottom:4px}
.bk-pay-desc{text-align:center;font-size:.78rem;color:var(--white60);margin-bottom:16px}
.bk-divider{display:flex;align-items:center;gap:12px;color:var(--white38);font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;margin:12px 0}
.bk-divider::before,.bk-divider::after{content:'';flex:1;height:1px;background:var(--white06)}
.promo-row{display:flex;gap:8px;margin-bottom:14px}
.promo-row input{flex:1}
.promo-row button{padding:0 16px;background:var(--white06);border:1px solid var(--white12);border-radius:10px;color:var(--white60);font-size:.78rem;font-weight:600;cursor:pointer}
.promo-msg{font-size:.7rem;margin:-10px 0 12px;padding:0 2px}
.promo-msg.ok{color:var(--cyan)}.promo-msg.err{color:var(--salmon)}

/* TAB BAR */
.tabs{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;align-items:flex-end;justify-content:space-around;height:calc(72px + var(--safe-b));padding-bottom:var(--safe-b);background:var(--navy95);backdrop-filter:saturate(1.4) blur(24px);-webkit-backdrop-filter:saturate(1.4) blur(24px);border-top:1px solid var(--white06)}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 6px;flex:1;color:var(--white38);transition:color .2s}
.tab.on{color:var(--cyan)}
.tab svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.tab span{font-size:.5rem;letter-spacing:.04em;font-weight:600}
.tab-bk{position:relative}
.tab-bk-o{width:56px;height:56px;border-radius:50%;background:var(--cyan);display:flex;align-items:center;justify-content:center;position:relative;top:-10px;box-shadow:0 4px 24px rgba(2,243,197,.28)}
.tab-bk-o svg{stroke:var(--navy);width:22px;height:22px;stroke-width:2.5}
.tab-bk span{position:relative;top:-6px}
</style>
</head>
<body>

<header class="hdr">
  <a href="index.html" class="hdr-back"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>Home</a>
  <a href="https://momence.com/m/443935" class="hdr-pill touch">3-Pack · €50</a>
</header>

<!-- DAYS -->
<div class="days" id="days"></div>
<!-- FILTERS -->
<div class="filters" id="filters"></div>
<!-- SKELETON -->
<div class="sk" id="sk">
  <div class="sk-r"><div class="sk-b" style="width:48px;height:36px"></div><div><div class="sk-b" style="width:140px;height:14px;margin-bottom:8px"></div><div class="sk-b" style="width:90px;height:10px"></div></div><div class="sk-b" style="width:64px;height:36px"></div></div>
  <div class="sk-r"><div class="sk-b" style="width:48px;height:36px"></div><div><div class="sk-b" style="width:120px;height:14px;margin-bottom:8px"></div><div class="sk-b" style="width:70px;height:10px"></div></div><div class="sk-b" style="width:64px;height:36px"></div></div>
  <div class="sk-r"><div class="sk-b" style="width:48px;height:36px"></div><div><div class="sk-b" style="width:160px;height:14px;margin-bottom:8px"></div><div class="sk-b" style="width:100px;height:10px"></div></div><div class="sk-b" style="width:64px;height:36px"></div></div>
  <div class="sk-r"><div class="sk-b" style="width:48px;height:36px"></div><div><div class="sk-b" style="width:130px;height:14px;margin-bottom:8px"></div><div class="sk-b" style="width:80px;height:10px"></div></div><div class="sk-b" style="width:64px;height:36px"></div></div>
</div>
<!-- CLASS LIST -->
<div class="schedule" id="sched" style="display:none"></div>

<!-- BOOKING MODAL -->
<div class="mo" id="mo">
  <div class="mo-box">
    <div class="mo-head">
      <div><div class="mo-t" id="mo-t">Book Class</div><div class="mo-c" id="mo-c"></div></div>
      <button class="mo-x" onclick="closeMo()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="mo-bd" id="mo-bd"></div>
    <div class="mo-ft"><div class="mo-sec"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Secure booking via SABDA</div></div>
  </div>
</div>

<!-- TAB BAR -->
<nav class="tabs">
  <a href="classes.html" class="tab"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Classes</span></a>
  <a href="schedule.html" class="tab on"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Schedule</span></a>
  <a href="schedule.html" class="tab tab-bk"><div class="tab-bk-o"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div><span>Book</span></a>
  <a href="pricing.html" class="tab"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>Pricing</span></a>
  <a href="index.html" class="tab"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></a>
</nav>

<script>
const API='https://momence.com/_api/primary/api/v1/Events?hostId=54278&token=a0314a80ca';
let allE=[],selDate=null,actF='All';

function getCat(t){
  const l=t.toLowerCase();
  if(l.includes('vinyasa')||l.includes('hatha')||l.includes('yin yoga')||l.includes('yoga sculpt'))return'Yoga';
  if(l.includes('pilates')||l.includes('glutes'))return'Pilates';
  if(l.includes('sound')||l.includes('serenity')||l.includes('guided sound'))return'Sound';
  if(l.includes('breath')||l.includes('recharge'))return'Breathwork';
  return'Other';
}
function getLang(t){const m=t.match(/\[(.*?)\]/);return m?m[1]:'';}
function clean(t){return t.replace(/\s*\[.*?\]\s*/,'').trim();}
function fmtTime(iso){
  const d=new Date(iso);
  return d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Europe/Madrid'});
}

function get7d(){
  const days=[];const now=new Date();
  for(let i=0;i<7;i++){const d=new Date(now);d.setDate(now.getDate()+i);days.push(d);}
  return days;
}
function getMadridDate(d){return d.toLocaleDateString('en-CA',{timeZone:'Europe/Madrid'});}

function renderDays(){
  const c=document.getElementById('days');
  const days=get7d();
  const nm=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  c.innerHTML=days.map((d,i)=>{
    const ds=getMadridDate(d);
    const madridDay=new Date(d.toLocaleString('en-US',{timeZone:'Europe/Madrid'}));
    return`<button class="day-btn${i===0?' active':''}" data-d="${ds}" onclick="selDay(this,'${ds}')"><span class="day-name">${i===0?'Today':nm[madridDay.getDay()]}</span><span class="day-num">${madridDay.getDate()}</span></button>`;
  }).join('');
  selDate=getMadridDate(days[0]);
}

function selDay(b,ds){
  document.querySelectorAll('.day-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');selDate=ds;renderSched();
}

function renderFilters(ev){
  const c=document.getElementById('filters');
  const cats=new Set(['All']);ev.forEach(e=>cats.add(getCat(e.title)));
  c.innerHTML=[...cats].map(x=>`<button class="fp${x==='All'?' active':''}" onclick="setF(this,'${x}')">${x}</button>`).join('');
}

function setF(b,cat){
  document.querySelectorAll('.fp').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');actF=cat;renderSched();
}

function renderSched(){
  const c=document.getElementById('sched');
  let f=allE.filter(e=>{
    const ed=new Date(e.dateTime).toLocaleDateString('en-CA',{timeZone:'Europe/Madrid'});
    return ed===selDate&&!e.isCancelled&&!e.isDeleted;
  });
  if(actF!=='All')f=f.filter(e=>getCat(e.title)===actF);
  // Filter out classes that already started
  f=f.filter(e=>new Date(e.dateTime)>=new Date());
  f.sort((a,b)=>new Date(a.dateTime)-new Date(b.dateTime));

  if(!f.length){c.innerHTML='<div class="empty">No classes scheduled for this day.</div>';return;}

  c.innerHTML=f.map((e,i)=>{
    const time=fmtTime(e.dateTime);const[h,m]=time.split(':');
    const title=clean(e.title);const lang=getLang(e.title);
    const sp=e.spotsRemaining;const full=sp===0;
    let sc='av',st=sp+(sp===1?' spot left':' spots left');
    if(full){sc='fu';st='Full';}
    else if(sp<=5){sc='lo';}
    const fn=(e.teacher||'').split(' ')[0]||'';
    const lnk=(e.link||'').replace(/'/g,"\\'");
    const ttl=title.replace(/'/g,"\\'");
    const tfn=fn.replace(/'/g,"\\'");

    return`<div class="cc" style="animation-delay:${i*.05}s"><div class="ct"><div class="ct-h">${h}:${m}</div><div class="ct-d">${e.duration} min</div></div><div class="ci"><div class="ci-t">${title}${lang?`<span class="ci-lg">${lang}</span>`:''}</div><div class="ci-tc">${fn}</div><div class="ci-sp ${sc}">${st}</div></div><div class="ca">${full?(e.allowWaitlist?`<button class="bb wl" onclick="openMo('${lnk}','${ttl}','${time}','${tfn}')">Waitlist</button>`:`<button class="bb fu">Full</button>`):`<button class="bb" onclick="openMo('${lnk}','${ttl}','${time}','${tfn}')">Book</button>`}</div></div>`;
  }).join('');
}

const PROXY='https://sabda-checkout-proxy.sabda.workers.dev';
let curSession=null, curUser=null, curMembership=null, curSessionToken=null;
let isProcessing=false;
let proxyAlive=true;

// Health check — if Worker is down, fall back to Momence for all bookings
fetch(PROXY+'/sabda-api/health',{method:'GET'}).then(function(r){proxyAlive=r.ok;}).catch(function(){proxyAlive=false;});

// Fix #5: scroll modal to top on every step change
function stepChange(){
  isProcessing=false;
  var box=document.querySelector('.mo-box');
  if(box) box.scrollTop=0;
}
function showFallback(){
  if(!curSession||!curSession.link) return;
  var err=document.getElementById('bk-err');
  if(err&&err.textContent){
    err.innerHTML=err.textContent+'<br><a href="'+curSession.link+'" target="_blank" style="color:var(--cyan);text-decoration:underline;font-size:.78rem">Book on Momence instead →</a>';
  }
}

function openMo(link,title,time,teacher){
  if(isProcessing) return;

  // Layer 1: if proxy is down, go straight to Momence
  if(!proxyAlive){window.open(link,'_blank');return;}
  // Extract session ID from link
  var sid=link.match(/\/s\/(\d+)/);
  if(sid) sid=sid[1]; else { sid=link.match(/\/(\d+)$/); sid=sid?sid[1]:null; }
  if(!sid){window.open(link,'_blank');return;}

  // Find session data
  var sess=allE.find(function(e){return String(e.id)===sid;});
  curSession={id:sid,title:clean(title),time:time,teacher:teacher,link:link,
    spots:sess?sess.spotsRemaining:null,duration:sess?sess.duration:null,
    isWaitlist:sess?sess.spotsRemaining===0:false};

  document.getElementById('mo-t').textContent=curSession.title;
  document.getElementById('mo-c').textContent=time+(teacher?' · '+teacher:'');

  // Always show login step — server handles session
  showLoginStep();
  document.getElementById('mo').classList.add('open');
  document.getElementById('mo').style.display='flex';
  document.body.style.overflow='hidden';
  // Fix #9: push history state so browser back closes modal
  history.pushState({modal:true},'');
}

function closeMo(){
  document.getElementById('mo').classList.remove('open');
  document.body.style.overflow='';
  setTimeout(function(){
    document.getElementById('mo').style.display='none';
    document.getElementById('mo-bd').innerHTML='';
  },300);
  // Reset state
  curSession=null;curMembership=null;isProcessing=false;
  activePromo=null;discountedPrice=null;
  activePayReq=null;activePayName=null;
  if(cardElement){try{cardElement.destroy();}catch(e){}cardElement=null;}
}
document.getElementById('mo').addEventListener('click',function(e){if(e.target===this)closeMo();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeMo();});
// Fix #9: browser back closes modal
window.addEventListener('popstate',function(e){
  if(document.getElementById('mo').classList.contains('open')) closeMo();
});
// Clear field error state on input
document.addEventListener('input',function(e){if(e.target.classList)e.target.classList.remove('bk-field-err');});
document.addEventListener('change',function(e){if(e.target.classList)e.target.classList.remove('bk-field-err');});

function getSpotsHtml(){
  var sp=curSession?curSession.spots:null;
  if(sp===0) return curSession.isWaitlist?'<div class="bk-spots lo">Waitlist</div>':'<div class="bk-spots lo">Full</div>';
  if(sp!==null) return '<div class="bk-spots '+(sp<=5?'lo':'av')+'">'+sp+(sp===1?' spot left':' spots left')+'</div>';
  return '';
}

function doLogin(){if(isProcessing)return;
  var emailEl=document.getElementById('bk-email');
  var passEl=document.getElementById('bk-pass');
  var email=emailEl.value.trim();
  var pass=passEl.value;
  var err=document.getElementById('bk-err');
  var btn=document.getElementById('bk-login-btn');
  var ok=true;
  emailEl.classList.remove('bk-field-err');passEl.classList.remove('bk-field-err');
  if(!email||!validateEmail(email)){emailEl.classList.add('bk-field-err');ok=false;}
  if(!pass){passEl.classList.add('bk-field-err');ok=false;}
  if(!ok){err.textContent='Please fill in the highlighted fields';return;}
  err.textContent='';isProcessing=true;btn.textContent='Signing in...';btn.disabled=true;

  fetch(PROXY+'/sabda-api/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email,password:pass,sessionId:curSession.id})
  }).then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d}});})
  .then(function(r){
    if(!r.ok||r.data.error){
      err.innerHTML='Wrong email or password. <a href="'+curSession.link+'" target="_blank" style="color:var(--cyan);text-decoration:underline">Book on Momence →</a>';
      isProcessing=false;btn.textContent='Log in & Book';btn.disabled=false;
      return;
    }
    // MFA required — show code input
    if(r.data.mfaRequired){
      showMfaStep(r.data.mfaToken);
      return;
    }
    var d=r.data;
    if(!curSession) return; // modal was closed during request
    curUser={
      id:d.user.id,
      email:d.user.email||email,
      firstName:d.user.firstName||email.split('@')[0],
      lastName:d.user.lastName||'',
      memberId:d.user.memberId
    };
    curSessionToken=d.sessionToken;
    curSession.price=d.sessionPrice||22;

    if(d.hasUsableMembership&&d.memberships.length>0){
      showConfirmStep(d.memberships[0]);
    } else {
      showNoMembership();
    }
  }).catch(function(){
    err.textContent='Connection error. Please try again.';
    isProcessing=false;btn.textContent='Log in & Book';btn.disabled=false;
    showFallback();
  });
}

function doMfaVerify(){if(isProcessing)return;
  var code=document.getElementById('bk-mfa').value.trim();
  var err=document.getElementById('bk-err');
  var btn=document.getElementById('bk-mfa-btn');
  if(!code||code.length<6){err.textContent='Please enter the 6-digit code';return;}
  err.textContent='';isProcessing=true;btn.textContent='Verifying...';btn.disabled=true;

  fetch(PROXY+'/sabda-api/mfa-verify',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({mfaToken:curMfaToken,code:code,sessionId:curSession.id})
  }).then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d}});})
  .then(function(r){
    if(!r.ok||r.data.error){
      err.innerHTML='Invalid code. <a href="'+curSession.link+'" target="_blank" style="color:var(--cyan);text-decoration:underline">Book on Momence instead →</a>';
      isProcessing=false;btn.textContent='Verify & Continue';btn.disabled=false;
      return;
    }
    var d=r.data;
    if(!curSession) return; // modal was closed
    curUser={
      id:d.user.id,
      email:d.user.email,
      firstName:d.user.firstName||d.user.email.split('@')[0],
      lastName:d.user.lastName||'',
      memberId:d.user.memberId
    };
    curSessionToken=d.sessionToken;
    curSession.price=d.sessionPrice||22;

    if(d.hasUsableMembership&&d.memberships.length>0){
      showConfirmStep(d.memberships[0]);
    } else {
      showNoMembership();
    }
  }).catch(function(){
    err.textContent='Connection error. Please try again.';
    isProcessing=false;btn.textContent='Verify & Continue';btn.disabled=false;
    showFallback();
  });
}

function customerFieldsHTML(){
  return '<div class="bk-label" style="margin-top:16px">Phone number / Número de teléfono</div>'
    +'<div style="display:flex;gap:8px">'
    +'<input class="bk-input" id="bk-cc" type="text" value="+34" style="width:68px;flex-shrink:0;text-align:center;font-weight:600" />'
    +'<input class="bk-input" id="bk-phone" type="tel" placeholder="612 345 678" style="flex:1" />'
    +'</div>'
    +'<div class="bk-label">Preferred language / Idioma preferido</div>'
    +'<select class="bk-input" id="bk-lang" style="appearance:auto;cursor:pointer">'
    +'<option value="">Select / Seleccionar</option>'
    +'<option value="English">English</option>'
    +'<option value="Castellano">Castellano</option>'
    +'</select>'
    +'<div class="bk-label">City of residence / Ciudad de residencia</div>'
    +'<input class="bk-input" id="bk-city" type="text" placeholder="Barcelona" />';
}
function getCustomerFields(){
  var cc=(document.getElementById('bk-cc')||{}).value||'+34';
  if(!cc.startsWith('+')) cc='+'+cc;
  var phone=(document.getElementById('bk-phone')||{}).value||'';
  phone=phone.replace(/\s/g,'').replace(/^0+/,'');
  var lang=(document.getElementById('bk-lang')||{}).value||'';
  var city=(document.getElementById('bk-city')||{}).value||'';
  return{phoneNumber:cc+phone,customerFields:{"164360":lang,"164361":city}};
}
function validateCustomerFields(){
  var ok=true;
  var fields=[
    {id:'bk-cc',test:function(v){return v&&v.startsWith('+')&&v.length>=2;},msg:'Country code required'},
    {id:'bk-phone',test:function(v){return v.replace(/\s/g,'').length>=6;},msg:'Phone number required'},
    {id:'bk-lang',test:function(v){return!!v;},msg:'Please select a language'},
    {id:'bk-city',test:function(v){return v.trim().length>0;},msg:'City is required'}
  ];
  fields.forEach(function(f){
    var el=document.getElementById(f.id);
    if(!el)return;
    if(!f.test(el.value)){
      el.classList.add('bk-field-err');ok=false;
    } else {
      el.classList.remove('bk-field-err');
    }
  });
  return ok?null:'Please fill in the highlighted fields';
}
function clearFieldErrors(){
  document.querySelectorAll('.bk-field-err').forEach(function(el){el.classList.remove('bk-field-err');});
}
function validateEmail(email){
  return/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function doBookWithMembership(){if(isProcessing)return;
  var btn=document.getElementById('bk-confirm-btn');
  var err=document.getElementById('bk-err');
  var vErr=validateCustomerFields();
  if(vErr){err.textContent=vErr;return;}
  isProcessing=true;btn.textContent='Booking...';btn.disabled=true;err.textContent='';

  var m=curMembership||{};
  var cf=getCustomerFields();

  fetch(PROXY+'/sabda-api/book',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      sessionId:curSession.id,
      sessionToken:curSessionToken,
      memberId:curUser.memberId,
      memberMembershipId:m.memberMembershipId||m.id||m.membershipId,
      firstName:curUser.firstName,
      lastName:curUser.lastName,
      email:curUser.email,
      phoneNumber:cf.phoneNumber,
      customerFields:cf.customerFields
    })
  }).then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d}});})
  .then(function(r){
    if(r.ok&&r.data.success){
      showSuccess();
    } else {
      var msg=(r.data&&(r.data.error||r.data.message))||'Booking failed. Please try again.';
      if(document.getElementById('bk-err')) document.getElementById('bk-err').textContent=msg;
      showFallback();
      isProcessing=false;
      var b=document.getElementById('bk-confirm-btn');if(b){b.textContent='Confirm Booking';b.disabled=false;}
    }
  }).catch(function(){
    var e=document.getElementById('bk-err');if(e)e.textContent='Connection error. Please try again.';
    showFallback();
    isProcessing=false;var b=document.getElementById('bk-confirm-btn');if(b){b.textContent='Confirm Booking';b.disabled=false;}
  });
}

var stripeInstance=null, cardElement=null;
var activePromo=null, discountedPrice=null;
var activePayReq=null, activePayName=null;

function applyPromo(type,origPrice,productId){
  var code=(document.getElementById('bk-promo')||{}).value.trim().toUpperCase();
  var okEl=document.getElementById('bk-promo-ok');
  var errEl=document.getElementById('bk-promo-err');
  var btn=document.getElementById('bk-promo-btn');
  if(!code){errEl.textContent='Enter a code';errEl.style.display='block';okEl.style.display='none';return;}
  btn.textContent='...';btn.disabled=true;errEl.style.display='none';okEl.style.display='none';

  var body={code:code,hostId:54278,price:origPrice};
  body.sessionId=curSession.id;
  if(productId) body.membershipId=productId;

  fetch(PROXY+'/sabda-api/promo',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  }).then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d}});})
  .then(function(r){
    btn.textContent='Apply';btn.disabled=false;
    if(!r.ok||r.data.error){
      errEl.textContent=r.data.error||'Invalid promo code';
      errEl.style.display='block';
      activePromo=null;discountedPrice=null;
      return;
    }
    activePromo=r.data.code;
    discountedPrice=r.data.newPrice;
    // Update UI
    var desc=r.data.type==='percentage'?r.data.appliedDiscount+'% off':'€'+r.data.appliedDiscount+' off';
    okEl.innerHTML='<strong>'+activePromo+'</strong> applied — '+desc+' <span onclick="removePromo('+origPrice+')" style="cursor:pointer;text-decoration:underline;margin-left:8px">Remove</span>';
    okEl.style.display='block';
    document.getElementById('bk-total').innerHTML='<span style="text-decoration:line-through;color:var(--white38);font-size:1rem;margin-right:8px">€'+origPrice+'</span> €'+discountedPrice.toFixed(2);
    // Update pay button
    var payBtn=document.getElementById('bk-pay-btn');
    if(payBtn){
      if(discountedPrice===0){
        payBtn.textContent='Book Free Class';
        // Hide card and Apple Pay — no payment needed
        var cardWrap=document.getElementById('bk-card');if(cardWrap)cardWrap.parentElement.style.display='none';

    +'<div class="bk-class-name">'+curSession.title+'</div>'
    +'<div class="bk-class-meta">'

    +(curSession.teacher?'<span>'+curSession.teacher+'</span>':'')
    +'</div></div>'
    +'<div class="bk-confirm">'
    +'<div class="bk-user">Booking as <strong>'+esc(curUser.firstName)+' '+esc(curUser.lastName)+'</strong></div>'
    +'<div class="bk-membership">'
    +'<div class="bk-membership-name">'+name+'</div>'
    +'<div class="bk-membership-detail">'+desc+(type==='membership'&&price<200?' · Billed monthly':'')+'</div>'
    +'</div>'
    +'<div class="bk-pay-total" id="bk-total">€'+price+'</div>'
    +'<div class="bk-pay-desc" id="bk-pay-desc">'+(type==='membership'&&price<200?'First month, renews monthly':type==='membership'?'Billed once':'One-time payment')+'</div>'
    +'<div id="bk-promo-wrap" style="margin-bottom:16px">'
    +'<div class="bk-link" id="bk-promo-toggle" onclick="document.getElementById(\'bk-promo-fields\').style.display=\'flex\';this.style.display=\'none\'" style="margin:0;font-size:.8rem;text-align:left;color:var(--cyan)">Apply promo code →</div>'
    +'<div id="bk-promo-fields" style="display:none;gap:8px;align-items:flex-start">'
    +'<input class="bk-input" id="bk-promo" type="text" placeholder="Code" style="flex:1;margin-bottom:0;text-transform:uppercase" />'
    +'<button class="bk-primary" id="bk-promo-btn" onclick="applyPromo(\''+type+'\','+price+','+productId+')" style="width:auto;padding:12px 20px;flex-shrink:0;font-size:.8rem">Apply</button>'
    +'</div>'
    +'<div id="bk-promo-ok" style="display:none;font-size:.78rem;color:var(--cyan);margin-top:6px"></div>'
    +'<div id="bk-promo-err" style="display:none;font-size:.78rem;color:var(--salmon);margin-top:6px"></div>'
    +'</div>'
    +customerFieldsHTML()
    +'<div id="bk-pay-request" style="margin-top:16px;display:none"></div>'
    +'<div id="bk-pay-divider" class="bk-divider" style="display:none">or pay with card</div>'
    +'<div class="bk-label" id="bk-card-label" style="margin-top:16px">Card Details</div>'
    +'<div class="bk-card-wrap" id="bk-card"></div>'
    +'<div class="bk-err" id="bk-err"></div>'
    +'<button class="bk-primary" id="bk-pay-btn" onclick="doPayAndBook(\''+type+'\','+price+','+productId+')">Pay €'+price+(type==='single'?' & Book':' & Book Class')+'</button>'
    +'<div class="bk-link" onclick="showNoMembership()">← Change plan</div>'
    +'</div>';

  // Initialize Stripe — clean up previous card element
  if(cardElement){try{cardElement.destroy();}catch(e){}cardElement=null;}
  if(typeof Stripe==='undefined'){
    document.getElementById('bk-err').textContent='Payment form could not load. Please disable ad blockers and refresh.';
    return;
  }
  if(!stripeInstance){
    stripeInstance=Stripe('pk_live_RoPa2iuvwBbqEISUd2LYTmKF',{stripeAccount:'acct_1RUWnoBf6nsynAht'});
  }

  // Apple Pay / Google Pay via Payment Request API
  try{
    activePayName=name;
    activePayReq=stripeInstance.paymentRequest({
      country:'ES',
      currency:'eur',
      total:{label:'SABDA Studio — '+name,amount:Math.round(price*100)},
      requestPayerName:true,
      requestPayerEmail:true
    });
    var prButton=stripeInstance.elements().create('paymentRequestButton',{
      paymentRequest:activePayReq,
      style:{paymentRequestButton:{type:'default',theme:'light-outline',height:'48px'}}
    });
    activePayReq.canMakePayment().then(function(result){
      if(result){
        document.getElementById('bk-pay-request').style.display='block';
        document.getElementById('bk-pay-divider').style.display='flex';
        prButton.mount('#bk-pay-request');
      }
    });
    activePayReq.on('paymentmethod',function(ev){
      // Validate customer fields first
      var vErr=validateCustomerFields();
      if(vErr){ev.complete('fail');return;}
      isProcessing=true;
      var cf=getCustomerFields();
      fetch(PROXY+'/sabda-api/pay',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          sessionId:curSession.id,
          sessionToken:curSessionToken,
          stripePaymentMethodId:ev.paymentMethod.id,
          firstName:curUser.firstName,
          lastName:curUser.lastName,
          email:curUser.email,
          type:type,
          productId:productId,
          discountCode:activePromo||undefined,
          actualPrice:(discountedPrice!==null)?discountedPrice:price,
          phoneNumber:cf.phoneNumber,
          customerFields:cf.customerFields
        })
      }).then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d}});})
      .then(function(r){
        if(r.data.success){
          ev.complete('success');
          showSuccess();
        } else if(r.data.clientSecret){
          stripeInstance.confirmCardPayment(r.data.clientSecret).then(function(conf){
            if(conf.error){ev.complete('fail');isProcessing=false;}
            else{ev.complete('success');showSuccess();}
          });
        } else {
          ev.complete('fail');
          var errEl=document.getElementById('bk-err');
          if(errEl) errEl.textContent=r.data.error||'Payment failed.';
          showFallback();
          isProcessing=false;
        }
      }).catch(function(){ev.complete('fail');isProcessing=false;});
    });
  }catch(e){}

  var elements=stripeInstance.elements();
  cardElement=elements.create('card',{
    style:{
      base:{color:'#f0efe9',fontSize:'16px',fontFamily:'DM Sans, sans-serif','::placeholder':{color:'rgba(240,239,233,0.38)'}},
      invalid:{color:'#F8A6A3'}
    }
  });
  cardElement.mount('#bk-card');
}

function doPayAndBook(type,price,productId){if(isProcessing)return;
  var btn=document.getElementById('bk-pay-btn');
  var err=document.getElementById('bk-err');
  var vErr=validateCustomerFields();
  if(vErr){err.textContent=vErr;return;}
  isProcessing=true;btn.textContent='Processing...';btn.disabled=true;err.textContent='';

  var cf=getCustomerFields();
  var finalPrice=(discountedPrice!==null)?discountedPrice:price;

  // Free booking (100% promo) — skip Stripe entirely
  if(finalPrice===0){
    fetch(PROXY+'/sabda-api/pay',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        sessionId:curSession.id,
        sessionToken:curSessionToken,
        stripePaymentMethodId:'free',
        firstName:curUser.firstName,
        lastName:curUser.lastName,
        email:curUser.email,
        type:type,
        productId:productId,
        discountCode:activePromo||undefined,
        actualPrice:0,
        phoneNumber:cf.phoneNumber,
        customerFields:cf.customerFields
      })
    }).then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d}});})
    .then(function(r){
      if(r.data.success){showSuccess();}
      else{err.textContent=r.data.error||'Booking failed.';showFallback();isProcessing=false;btn.textContent='Book Free Class';btn.disabled=false;}
    }).catch(function(){err.textContent='Connection error.';isProcessing=false;btn.textContent='Book Free Class';btn.disabled=false;showFallback();});
    return;
  }

  stripeInstance.createPaymentMethod({type:'card',card:cardElement,billing_details:{
    name:curUser.firstName+' '+curUser.lastName,
    email:curUser.email
  }}).then(function(result){
    if(result.error){
      err.textContent=result.error.message;
      showFallback();
      isProcessing=false;btn.textContent='Pay & Book';btn.disabled=false;
      return;
    }
    return fetch(PROXY+'/sabda-api/pay',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        sessionId:curSession.id,
        sessionToken:curSessionToken,
        stripePaymentMethodId:result.paymentMethod.id,
        firstName:curUser.firstName,
        lastName:curUser.lastName,
        email:curUser.email,
        type:type,
        productId:productId,
        discountCode:activePromo||undefined,
        actualPrice:(discountedPrice!==null)?discountedPrice:price,
        phoneNumber:cf.phoneNumber,
        customerFields:cf.customerFields
      })
    }).then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d}});})
    .then(function(r){
      if(r.data.success){
        showSuccess();
      } else if(r.data.clientSecret){
        return stripeInstance.confirmCardPayment(r.data.clientSecret).then(function(conf){
          if(conf.error){
            err.textContent=conf.error.message;
            showFallback();
            isProcessing=false;btn.textContent='Pay & Book';btn.disabled=false;
          } else {
            showSuccess();
          }
        });
      } else {
        err.textContent=r.data.error||'Payment failed. Please try again.';
        showFallback();
        isProcessing=false;btn.textContent='Pay & Book';btn.disabled=false;
      }
    });
  }).catch(function(){
    err.textContent='Connection error. Please try again.';
    isProcessing=false;btn.textContent='Pay & Book';btn.disabled=false;
    showFallback();
  });
}

}

 la resistencia f\u00edsica como mental. Esta clase se imparte en ingl\u00e9s. No se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/126089621", "dateTime": "2026-04-04T08:15:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/01cbb92e-633f-416a-ac0d-a447c973e49d.jpeg", "image2": null, "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": false, "capacity": 30, "spotsRemaining": 11, "ticketsSold": 19, "tags": [], "hostId": 54278, "published": true, "teacherId": 160407, "originalTeacherId": 160407, "originalTeacher": "Elita Dionigi", "teacher": "Elita Dionigi", "additionalTeachers": []}, {"id": 126090823, "title": "Power Pilates [EN]", "description": "(EN): A dynamic and intense session that fuses fitness and Pilates to work your entire body. This class uses a combination of isolated and integrated movements to build control, core strength, balance, and muscular endurance. Perfect for those looking to challenge their limits and enhance their overall fitness and body awareness. This class is taught in English. No previous experience necessary.\n\n(ES): Una sesi\u00f3n din\u00e1mica e intensa que fusiona el fitness y el Pilates para trabajar todo el cuerpo. Esta clase utiliza una combinaci\u00f3n de movimientos aislados e integrados para desarrollar el control, la fuerza del core, el equilibrio y la resistencia muscular. Perfecta para quienes buscan desafiar sus l\u00edmites y mejorar su condici\u00f3n f\u00edsica y conciencia corporal en general. Esta clase se imparte en ingl\u00e9s. No se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/126090823", "dateTime": "2026-04-04T09:30:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/67c882cb-0500-4670-8ce3-326a7334d4ed.jpeg", "image2": null, "duration": 60, "fixedPrice": 20, "online" e1ctica de asanas de yoga para una experiencia m\u00e1s potente y con impulso cardiovascular. Yoga Sculpt mejora tanto la resiliencia f\u00edsica como mental, proporcionando un desaf\u00edo equilibrado para el cuerpo y la mente. Esta clase se imparte en ingl\u00e9s. No se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/126113924", "dateTime": "2026-04-05T10:30:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/5191a3dc-b1bd-451f-a510-fdf25618af67.jpeg", "image2": null, "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": "", "streamPassword": "", "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 23, "ticketsSold": 7, "tags": [], "hostId": 54278, "published": true, "teacherId": 160652, "originalTeacherId": 160652, "originalTeacher": "Lili Boleor", "teacher": "Lili Boleor", "additionalTeachers": []}, {"id": 131834794, "title": "Hatha Vinyasa [EN]", "description": "(EN): This class emphasizes precise body alignment and correct pose positioning to enhance stability and prevent injuries. Through slow, deliberate movements and holds, practitioners refine their technique and deepen their awareness in each posture. Props and modifications are encouraged to accommodate various levels of flexibility and strength, ensuring safe and effective participation for everyone. This approach helps build a solid foundation, promoting physical, mental, and spiritual well-being. This class is taught in English. No previous experience necessary.\n\n(ES): Esta clase enfatiza la alineaci\u00f3n precisa del cuerpo y la correcta colocaci\u00f3n de las posturas para mejorar la estabilidad y prevenir lesiones. A trav\u00e9s de movimientos lentos y deliberados, los practicantes refinan su t\u00e9cnica y profundizan su conciencia en cada postura. Se fomenta el uso de accesorios y modificaciones para adaptarse a diversos niveles de flexibilidad y fuerza, garantizando una participaci\u00f3n segura y efectiva para todos. Este enfoque ayuda a construir una base s\u00f3lida, promoviendo el bienestar f\u00edsico, mental y espiritual. Esta clase se imparte en ingl\u00e9s. No se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/131834794", "dateTime": "2026-04-05T15:45:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/0f4c41cf-aa2c-4912-a2c4-ffe5c3721187.jpeg", "image2": null, "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": "", "streamPassword": "", "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 19, "ticketsSold": 11, "tags": [], "hostId": 54278, "published": true, "teacherId": 158940, "originalTeacherId": 158940, "originalTeacher": "Saurabh Sathyashankar", "teacher": "Saurabh Sathyashankar", "additionalTeachers": []}, {"id": 131834905, "title": "Serenity and Sound [EN]", "description": "(EN):\nSerenity and Sound is a calming practice that blends gentle yoga stretches, mindful breathing, and the restorative power of sound healing.\n\nThe class begins with soft movements to ease tension and closes with an extended savasana as soothing sounds guide you into deep rest.\n\nOpen to all levels: relax, reset, and restore your balance.\n\nNo previous experience necessary.\n\n(ES):\nSerenidad y Sonido es una pr\u00e1ctica calmante que combina suaves estiramientos de yoga, respiraci\u00f3n consciente y el poder restaurador de la terapia de sonido.\n\nLa clase comienza con movimientos suaves para liberar tensiones y finaliza con una savasana extendida mientras los sonidos sanadores te gu\u00edan hacia un descanso profundo.\n\nAbierto a todos los niveles: rel\u00e1jate, restablece tu energ\u00eda y recupera tu equilibrio.\n\nNo se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/131834905", "dateTime": "2026-04-05T17:00:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/be568755-2a22-4fc3-99a1-3eb929d7cd5d.jpg", "image2": null, "duration": 75, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 21, "ticketsSold": 9, "tags": [], "hostId": 54278, "published": true, "teacherId": 325565, "originalTeacherId": 187477, "originalTeacher": "Joelle Monfiletto", "teacher": "Claudia Exp\u00f3sito Pedrero", "additionalTeachers": []}, {"id": 131835244, "title": "Reset & Calm Breathwork [EN]", "description": "[EN] Using a conscious and connected breathing technique, we access an altered state of consciousness that allows us to regulate the nervous system, step out of autopilot mode, and live a more conscious and aligned life.\n\nWhen our nervous system is dysregulated, all alerts are activated, and the mind believes it is in danger. This leads us to be dominated by a constant state of anxiety and stress. If you live with anxiety, if you struggle to be aware of your breathing, if you know you need to pause but don't know how\u2014this is exactly what you need.\n\nIn this session, we are going to regulate your nervous system so you can live a more aligned life.\n\nThis class includes guided breathwork that may be physically and emotionally activating. It is not recommended for those who are pregnant, have cardiovascular conditions (including high blood pressure), epilepsy or seizure disorders, severe respiratory illness, a history of psychosis, bipolar disorder, or recent major surgery. If you have asthma, anxiety, or any medical condition, please consult your healthcare provider before attending and inform your facilitator. You are always in control and may return to normal breathing at any time.\n\n[ESP] Utilizando una t\u00e9cnica de respiraci\u00f3n consciente y conectada, accedemos a un estado alterado de consciencia que nos va a permitir regular el sistema nervioso para salir del piloto autom\u00e1tico y vivir una vida m\u00e1s consciente y alineada.\n\nCuando nuestro sistema nervioso esta desregulado todas las alertas se activan y la mente cree que esta en peligro, esto nos lleva a estar dominados por un estado constante de ansiedad y estr\u00e9s. Si vives con ansiedad, si te cuesta ser consciente de tu respiraci\u00f3n, si sabes que necesitas parar pero no sabes como, esto es lo que necesitas.\n\nEn esta sesi\u00f3n vamos a regular tu sistema nervioso para que puedas vivir una vida m\u00e1s alineada\n\nEsta clase incluye ejercicios de respiraci\u00f3n guiada que pueden resultar f\u00edsica y emocionalmente activadores. No se recomienda para personas que est\u00e9n embarazadas, tengan afecciones cardiovasculares (incluida hipertensi\u00f3n arterial), epilepsia o trastornos convulsivos, enfermedades respiratorias graves, antecedentes de psicosis, trastorno bipolar o hayan tenido una cirug\u00eda mayor reciente. Si tienes asma, ansiedad o cualquier otra condici\u00f3n m\u00e9dica, consulta a tu proveedor de atenci\u00f3n m\u00e9dica antes de asistir e informa a tu facilitador/a. T\u00fa siempre tienes el control y puedes volver a la respiraci\u00f3n normal en cualquier momento.", "type": "Regular", "link": "https://momence.com/s/131835244", "dateTime": "2026-04-05T18:30:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/097914c0-805e-42dc-bdfd-dabfa2ead826.jpeg", "image2": null, "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 25, "ticketsSold": 5, "tags": [], "hostId": 54278, "published": true, "teacherId": 267667, "originalTeacherId": 326265, "originalTeacher": "Paloma Martinez", "teacher": "Ellie Truffa", "additionalTeachers": []}, {"id": 127724487, "title": "Hatha Vinyasa [EN]", "description": "(EN): This class emphasizes mage1": "https://images.momence.com/h/54278/session-template-banner/08069d64-9beb-4123-aa9f-5e6b421c10c8.jpeg", "image2": null, "duration": 50, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 13, "ticketsSold": 17, "tags": [], "hostId": 54278, "published": true, "teacherId": 298902, "originalTeacherId": 171153, "originalTeacher": "Lali Dochiia", "teacher": "Natalia Dercz", "additionalTeachers": []}, {"id": 130006564, "title": "Full Body Pilates [EN]", "description": "(EN): A dynamic, well-rounded mat session rooted in the original Joseph Pilates method. This 55-minute class activates and strengthens deep stabilizing muscles while improving posture, mobility, and core control. Expect a seamless flow of classical mat exercises infused with sculpt-inspired elements for added tone and endurance. You\u2019ll leave feeling centered, strong, and lengthened from head to toe. This class is taught in English. No previous experience necessary.\n\n(ES): Una sesi\u00f3n din\u00e1mica y completa de pilates en colchoneta, basada en el m\u00e9todo original de Joseph Pilates. Esta clase de 55 minutos activa y fortalece los m\u00fasculos profundos estabilizadores, mejorando la postura, la movilidad y el control del core. Espera una secuencia fluida de ejercicios cl\u00e1sicos de pilates combinados con elementos inspirados en el entrenamiento de tonificaci\u00f3n para aumentar la resistencia y la fuerza. Saldr\u00e1s sinti\u00e9ndote centrado, fuerte y alargado de pies a cabeza. La clase se imparte en ingl\u00e9s. No se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/130006564", "dateTime": "2026-04-06T11:30:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/08069d64-9beb-4123-aa9f-5e6b421c10c8.jpeg", "image2": "https://images.momence.com/h/54278/session-host-photo/a1c6f9c1-8 olina Rodrigues", "teacher": "Cristina L McLauchlan", "additionalTeachers": []}, {"id": 126202561, "title": "Vinyasa [EN]", "description": "(EN):\nVinyasa yoga is characterized by a sequence of postures that flow smoothly from one to the next, synchronizing breath with the moment. This style emphasizes flexibility, strength, and endurance, as practitioners move through a dynamic flow. The continuous motion combined with deep, controlled breathing enhances both physical and mental stamina. This class is taught in English. No previous experience necessary.\n\n(ES):\nEl yoga Vinyasa se caracteriza por una secuencia de posturas que se conectan de una a la otra, sincronizando la respiraci\u00f3n con el movimiento. Este estilo enfatiza la flexibilidad, la fuerza y la resistencia, ya que los practicantes se mueven a trav\u00e9s de un flujo din\u00e1mico. El movimiento continuo combinado con una respiraci\u00f3n profunda y controlada mejora tanto la resistencia f\u00edsica como mental. Esta clase se imparte en ingl\u00e9s. No se requiere experiencia previa.", "type": "Regular", "link": "https://momence.com/s/126202561", "dateTime": "2026-04-06T17:15:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/01cbb92e-633f-416a-ac0d-a447c973e49d.jpeg", "image2": null, "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": false, "capacity": 30, "spotsRemaining": 26, "ticketsSold": 4, "tags": [], "hostId": 54278, "published": true, "teacherId": 160655, "originalTeacherId": 160655, "originalTeacher": "Shelley Chiprut", "teacher": "Shelley Chiprut", "additionalTeachers": []}, {"id": 127700333, "title": "Alchemy Breathwork [EN/ES]", "description": "[EN]\nAlchemy Breathwork is a guided journey, your breath becomes the portal a psychedelic journey where you access the medicine within.\n\nIn a 60 min session, through circular breathing, music and somatic release, we drop beneath the thinking mind and into altered states of clarity, vision and emotional alchemy- no substances, just the power of your own breath.\nExpect: visuals behind closed eyes, emotional release + nervous system reset, expanded awareness + deep embodiment. The feeling of coming home to your body\n\nNot suitable for people with cardiovascular or respiratory conditions, epilepsy, pregnancy, recent surgeries, or severe mental health issues. This class includes guided breathwork that may be physically and emotionally activating. It is not recommended for those who are pregnant, have cardiovascular conditions (including high blood pressure), epilepsy or seizure disorders, severe respiratory illness, a history of psychosis, bipolar disorder, or recent major surgery. If you have asthma, anxiety, or any medical condition, please consult your healthcare provider before attending and inform your facilitator. You are always in control and may return to normal breathing at any time.\n\n[ES]\nAlchemy Breathwork es un viaje guiado donde tu respiraci\u00f3n se convierte en el portal hacia una experiencia psicod\u00e9lica, permiti\u00e9ndote acceder a la medicina que llevas dentro.\n\nEn una sesi\u00f3n de 60 minutos, mediante respiraci\u00f3n circular, m\u00fasica y liberaci\u00f3n som\u00e1tica, descendemos por debajo de la mente pensante y entramos en estados alterados de claridad, visi\u00f3n y alquimia emocional\u2026 sin sustancias, solo con el poder de tu propia respiraci\u00f3n.\nPuedes esperar: visuales detr\u00e1s de los ojos cerrados, liberaci\u00f3n emocional + reseteo del sistema nervioso, conciencia expandida + encarnaci\u00f3n profunda. La sensaci\u00f3n de volver a casa en tu propio cuerpo.\n\nNo es adecuado para personas con problemas cardiovasculares o respiratorios, epilepsia, embarazo, cirug\u00edas recientes o problemas graves de salud mental. Esta clase incluye ejercicios de respiraci\u00f3n guiada que pueden resultar f\u00edsica y emocionalmente activadores. No se recomienda para personas que est\u00e9n embarazadas, tengan afecciones cardiovasculares (incluida hipertensi\u00f3n arterial), epilepsia o trastornos convulsivos, enfermedades respiratorias graves, antecedentes de psicosis, trastorno bipolar o hayan tenido una cirug\u00eda mayor reciente.\nSi tienes asma, ansiedad o cualquier otra condici\u00f3n m\u00e9dica, consulta a tu proveedor de atenci\u00f3n m\u00e9dica antes de asistir e informa a tu facilitador/a.\nT\u00fa siempre tienes el control y puedes volver a la respiraci\u00f3n normal en cualquier momento.", "type": "Regular", "link": "https://momence.com/s/127700333", "dateTime": "2026-04-06T18:30:00.000Z", "image1": "https://images.momence.com/h/54278/session-template-banner/88b3e338-0661-4383-829b-10e4082bb06e.jpeg", "image2": null, "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": null, "streamPassword": null, "isCancelled": false, "isDeleted": false, "allowWaitlist": false, "capacity": 30, "spotsRemaining": 23, "ticketsSold": 7, "tags": [], "hostId": 54278, "published": true, "teacherId": 160655, "originalTeacherId": 160655, "originalTeacher": "Shelley Chiprut", "teacher": "Shelley Chiprut", "additionalTeachers": []}, {"id": 127724764, "title": "Power Vinyasa [EN]", "description": "(EN):\nPower Vinyasa yoga is characterized by a fast-paced sequence of postures that flow smoothly from one to the next, synchronizing breath with the moment. This style emphasizes flexibility, strength, and endurance, as practitioners move through a dynamic flow. The continuous motion combined with deep, controlled breathing enhances both physical and mental stamina. This class is taught in English. Prior yoga experience recommended.\n\n(ES):\nEl yoga Power Vinyasa se caracteriza por una secuencia r\u00e1pida de posturas que se conectan de una a la otra, sincronizando la respiraci\u00f3n con el movimiento. Este estilo enfatiza la flexibilidad, la fuerza y la resistencia, ya que los practicantes se mueven a trav\u00e9s de un flujo din\u00e1mico. El movimiento continuo combinado con una respiraci\u00f3n profunda y controlada mejora tanto la resistencia f\u00edsica como mental. Esta clase se imparte en ingl\u00e9s. Se recomienda experiencia previa en yoga.", "type": "Regular", "link": "https://momence.com/s/127724764", "dateTime": "2026-04-07T06:00:00.000Z", "image1": null, "image2": "https://images.momence.com/h/54278/session-host-photo/63464ea2-de86-4711-a3fc-63233a269405.jpg", "duration": 60, "fixedPrice": 20, "online": false, "location": "SABDA", "streamLink": "", "streamPassword": "", "isCancelled": false, "isDeleted": false, "allowWaitlist": true, "capacity": 30, "spotsRemaining": 28, "ticketsSold": 2, "tags": [], "hostId": 54278, "published": true, "teacherId": 160406, "originalTeacherId": 160406, "originalTeacher": "Cristina L McLauchlan", "teacher": "Cristina L McLauchlan", "additionalTeachers": []}, {"id": 127725296, "title": "Glutes and Core Lab  [EN]", "description": "EN\nGlutes & Core Lab is an energizing and fun lower-body focused workout designed to build strength, power, and definition. Through controlled movements, functional sequences, and the use of props such as bands and light weights, you\u2019ll activate glutes, legs, and deep core muscles. Expect dynamic strength work balanced with focused stretching. This class emphasizes connection to your breath and body, improving stability, endurance, and posture. Open to all levels. No previous experience necessary.\n\nESP\n\nGlutes & Core Lab es una clase llena de energ\u00eda y diversi\u00f3n enfocada en fuerza, potencia y definici\u00f3n de gl\u00fateos, piernas y core profundo. A trav\u00e9s de secuencias controladas y el uso de props como bandas y pesas ligeras, trabajar\u00e1s estabilidad y resistencia. Incluye momentos de estiramiento y focus en la conexi\u00f3n con tu respiraci\u00f3n y tu cuerpo. Apta para todos los niveles. No se requiere experiencia pr
